<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakesurf Game</title>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #061a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}
canvas { display: block; }
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
#qr-container {
  background: rgba(0,0,0,0.85);
  border: 3px solid #00e5ff;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  pointer-events: auto;
}
#qr-container h2 {
  color: #00e5ff;
  font-size: 18px;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'Courier New', monospace;
}
#qr-container p {
  color: #88ccdd;
  font-size: 13px;
  margin-top: 12px;
}
#qr-box { margin: 0 auto; }
#status {
  color: #ffcc00;
  font-size: 14px;
  margin-top: 8px;
  font-family: 'Courier New', monospace;
}
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 5;
  pointer-events: none;
}
#hud-left, #hud-right {
  display: flex;
  flex-direction: column;
}
#score-display {
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
}
#combo-display {
  color: #ffd700;
  font-size: 14px;
  font-weight: 600;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  opacity: 0;
  transition: opacity 0.3s;
}
#trick-display {
  color: #00e5ff;
  font-size: 16px;
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  opacity: 0;
  transition: opacity 0.3s;
  text-align: right;
}
#time-display {
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
#game-over-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.75);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
  backdrop-filter: blur(4px);
}
#game-over-overlay h1 {
  color: #ff4444;
  font-size: 42px;
  font-weight: 800;
  text-shadow: 0 4px 12px rgba(0,0,0,0.5);
  margin-bottom: 8px;
}
#game-over-overlay p {
  color: #fff;
  font-size: 22px;
}
#game-over-overlay .sub {
  color: #88ccdd;
  font-size: 14px;
  margin-top: 6px;
}
#game-over-overlay .stats {
  color: #aaddee;
  font-size: 13px;
  margin-top: 12px;
  line-height: 1.6;
}
#keyboard-hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  z-index: 5;
}
#version {
  position: fixed;
  bottom: 4px;
  right: 8px;
  color: rgba(255,255,255,0.2);
  font-size: 10px;
  z-index: 50;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="hud-left">
    <div id="score-display">0</div>
    <div id="combo-display"></div>
  </div>
  <div id="hud-right">
    <div id="trick-display"></div>
    <div id="time-display"></div>
  </div>
</div>

<div id="overlay">
  <div id="qr-container">
    <h2>Scan to Connect Controller</h2>
    <div id="qr-box"></div>
    <p id="status">Initializing...</p>
  </div>
</div>

<div id="game-over-overlay">
  <h1>WIPEOUT!</h1>
  <p id="final-score">0</p>
  <p class="sub" id="restart-hint">Press SPACE or tap phone to restart</p>
  <div class="stats" id="stats-display"></div>
</div>

<div id="keyboard-hint">Arrow keys to steer &bull; Up/Down to pump &bull; Space to restart</div>
<div id="version">v4.0</div>

<script>
// ══════════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W;
canvas.height = H;

function fitCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ══════════════════════════════════════════════
//  GAME CONSTANTS
// ══════════════════════════════════════════════
const WAVE_CENTER_X = W * 0.48;
const WAVE_WIDTH_BASE = 160;
const BOAT_Y = 60;
const SURFER_START_Y = H * 0.62;

// Wake geometry
const WAKE_ORIGIN_X = W * 0.5;
const WAKE_ORIGIN_Y = BOAT_Y + 40;

// Physics
const GRAVITY = 0.3;
const DRAG = 0.94;
const GYRO_RANGE = 10;
const DEAD_ZONE = 1.2;
const GAMMA_BIAS = 0;
const BETA_BIAS = 1.3;
const BETA_NEUTRAL = 0;
const MAX_VEL = 6;
const WAVE_PUSH = 0.08;
const PUMP_FREQ_MIN = 0.75;
const PUMP_FREQ_MAX = 1.5;
const PUMP_BOOST = 0.4;

// Scoring
const POINTS_PER_FRAME = 1;
const SWEET_SPOT_BONUS = 3;
const CARVE_BONUS = 5;
const AIR_BONUS = 200;
const LAND_BONUS = 150;
const COMBO_DECAY_TIME = 2000;

// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
let gameState = 'waiting'; // waiting, riding, airborne, wipeout, gameover
let gameRunning = false;

// Surfer physics
let surfer = {
  x: WAVE_CENTER_X,
  y: SURFER_START_Y,
  vx: 0,
  vy: 0,
  speed: 0,         // accumulated speed from pumping
  rotation: 0,      // body lean angle
  kneeCompress: 0,  // 0=standing, 1=crouched
  armSpread: 0.5,   // 0=tight, 1=wide
  boardAngle: 0,
  onWave: true,
  airTime: 0,
  airStartY: 0,
  airVx: 0,
  airVy: 0,
};

// Wave parameters
let waveWidth = WAVE_WIDTH_BASE;
let sweetSpotWidth = 60;
let turbulence = 0;
let waveNarrowRate = 0;
let scrollY = 0;
let scrollSpeed = 3;
let difficulty = 0;
let difficultyTimer = 0;

// Scoring
let score = 0;
let combo = 1;
let comboTimer = 0;
let bestCombo = 1;
let trickText = '';
let trickTimer = 0;
let rideTime = 0;
let totalAirs = 0;
let totalCarves = 0;

// Gyro input (from controller)
let lastSensorGamma = 0, lastSensorBeta = 0;
let prevSensorGamma = 0, prevSensorBeta = 0;
let sensorTimestamp = 0;
let inputGamma = 0, inputBeta = 0;

// Pump detection
let betaHistory = [];
let pumpCooldown = 0;
let lastPumpTime = 0;
let pumpCount = 0;

// Visual state
let waterTime = 0;
let particles = [];
let sprayParticles = [];
let foamTrail = [];
let ripples = [];

// Connection
let controllerConnected = false;
let conn = null;

// Keyboard
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' && gameState === 'gameover') restartGame();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ══════════════════════════════════════════════
//  PEERJS NETWORKING (preserved from original)
// ══════════════════════════════════════════════
const peer = new Peer(null, {
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  }
});

peer.on('open', id => {
  document.getElementById('status').textContent = 'Waiting for controller...';
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  const url = base + 'controller.html?id=' + id;
  document.getElementById('qr-box').innerHTML = '';
  new QRCode(document.getElementById('qr-box'), {
    text: url, width: 200, height: 200,
    colorDark: '#00e5ff', colorLight: '#0a1628'
  });
});

peer.on('error', err => {
  document.getElementById('status').textContent = 'Connection error: ' + err.type;
});

peer.on('connection', c => {
  if (conn) { c.close(); return; }
  conn = c;
  controllerConnected = true;
  document.getElementById('status').textContent = 'Controller connected!';

  c.on('open', () => {
    c.send(JSON.stringify({ type: 'connected' }));
    setTimeout(() => {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('keyboard-hint').style.display = 'none';
      startGame();
    }, 800);
  });

  c.on('data', raw => {
    const msg = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (msg.type === 'gyro') {
      prevSensorGamma = lastSensorGamma;
      prevSensorBeta = lastSensorBeta;
      lastSensorGamma = msg.gamma;
      lastSensorBeta = msg.beta;
      sensorTimestamp = performance.now();
    } else if (msg.type === 'restart') {
      if (gameState === 'gameover') restartGame();
    }
  });

  c.on('close', () => {
    conn = null;
    controllerConnected = false;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('status').textContent = 'Controller disconnected. Scan again.';
  });
});

// Keyboard fallback start
setTimeout(() => {
  if (!controllerConnected) {
    document.getElementById('overlay').style.opacity = '0.6';
  }
}, 3000);

window.addEventListener('keydown', e => {
  if (!controllerConnected && gameState === 'waiting' &&
      (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('keyboard-hint').style.display = 'none';
    startGame();
  }
});

// ══════════════════════════════════════════════
//  GAME LIFECYCLE
// ══════════════════════════════════════════════
function startGame() {
  gameState = 'riding';
  gameRunning = true;
  score = 0;
  combo = 1;
  comboTimer = 0;
  bestCombo = 1;
  rideTime = 0;
  totalAirs = 0;
  totalCarves = 0;
  difficulty = 0;
  difficultyTimer = 0;
  waveWidth = WAVE_WIDTH_BASE;
  sweetSpotWidth = 60;
  turbulence = 0;
  scrollSpeed = 3;
  particles = [];
  sprayParticles = [];
  foamTrail = [];
  ripples = [];
  betaHistory = [];
  pumpCooldown = 0;
  pumpCount = 0;

  surfer.x = WAVE_CENTER_X;
  surfer.y = SURFER_START_Y;
  surfer.vx = 0;
  surfer.vy = 0;
  surfer.speed = 0;
  surfer.rotation = 0;
  surfer.kneeCompress = 0;
  surfer.armSpread = 0.5;
  surfer.boardAngle = 0;
  surfer.onWave = true;
  surfer.airTime = 0;

  document.getElementById('game-over-overlay').style.display = 'none';
}

function endGame() {
  gameState = 'gameover';
  gameRunning = false;
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('stats-display').innerHTML =
    'Ride time: ' + (rideTime / 60).toFixed(1) + 's<br>' +
    'Best combo: x' + bestCombo + '<br>' +
    'Airs: ' + totalAirs + ' &bull; Carves: ' + totalCarves;
  document.getElementById('game-over-overlay').style.display = 'flex';
  if (conn && conn.open) {
    conn.send(JSON.stringify({ type: 'gameover', score }));
  }
  // Wipeout particles
  for (let i = 0; i < 40; i++) {
    spawnSpray(surfer.x, surfer.y, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 1.5);
  }
}

function restartGame() {
  startGame();
}

// ══════════════════════════════════════════════
//  INPUT PROCESSING
// ══════════════════════════════════════════════
function processInput() {
  let gamma = 0, beta = 0;

  if (controllerConnected) {
    // Interpolate between sensor readings for smooth 60fps
    const elapsed = performance.now() - sensorTimestamp;
    const t = Math.min(1, elapsed / 33);
    gamma = prevSensorGamma + (lastSensorGamma - prevSensorGamma) * t - GAMMA_BIAS;
    beta = prevSensorBeta + (lastSensorBeta - prevSensorBeta) * t - BETA_BIAS;
  }

  // Keyboard fallback
  if (!controllerConnected) {
    if (keys['ArrowLeft']) gamma = -6;
    else if (keys['ArrowRight']) gamma = 6;
    if (keys['ArrowUp']) beta = -5;
    else if (keys['ArrowDown']) beta = 5;
  }

  // Clamp and dead zone for gamma
  gamma = Math.max(-GYRO_RANGE, Math.min(GYRO_RANGE, gamma));
  if (Math.abs(gamma) < DEAD_ZONE) gamma = 0;
  else gamma -= Math.sign(gamma) * DEAD_ZONE;

  // Clamp and dead zone for beta
  beta = Math.max(-GYRO_RANGE, Math.min(GYRO_RANGE, beta));
  if (Math.abs(beta) < DEAD_ZONE) beta = 0;
  else beta -= Math.sign(beta) * DEAD_ZONE;

  // Normalize to -1..1
  inputGamma = gamma / (GYRO_RANGE - DEAD_ZONE);
  inputBeta = beta / (GYRO_RANGE - DEAD_ZONE);
}

// ══════════════════════════════════════════════
//  WAVE GEOMETRY
// ══════════════════════════════════════════════
function getWaveLeftEdge(y) {
  // Wake spreads from boat — V shape widening downward
  const t = Math.max(0, (y - WAKE_ORIGIN_Y) / (H - WAKE_ORIGIN_Y));
  const spread = waveWidth * 0.5 * t;
  const center = WAKE_ORIGIN_X - spread * 0.1;
  const turb = turbulence * Math.sin(y * 0.02 + waterTime * 2) * 3;
  return center - spread + turb;
}

function getWaveRightEdge(y) {
  const t = Math.max(0, (y - WAKE_ORIGIN_Y) / (H - WAKE_ORIGIN_Y));
  const spread = waveWidth * 0.5 * t;
  const center = WAKE_ORIGIN_X + spread * 0.1;
  const turb = turbulence * Math.sin(y * 0.025 + waterTime * 2.3) * 3;
  return center + spread + turb;
}

function getWaveCenterX(y) {
  return (getWaveLeftEdge(y) + getWaveRightEdge(y)) / 2;
}

function getWaveWidthAt(y) {
  return getWaveRightEdge(y) - getWaveLeftEdge(y);
}

// How far across the wave face (0=trough/left, 1=lip/right)
function getWavePosition(x, y) {
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  if (right <= left) return 0.5;
  return (x - left) / (right - left);
}

// Wave surface height offset — the rolling curve of the wake
function getWaveSurfaceY(x, y) {
  const pos = getWavePosition(x, y);
  // Trough on left (low), face rises, lip on right (high then curls down)
  const profile = -10 * Math.sin(pos * Math.PI * 0.9) + 5 * pos;
  const ripple = Math.sin(x * 0.08 + waterTime * 3) * 1.5;
  return profile + ripple;
}

// Sweet spot — the power pocket of the wave
function getSweetSpotCenter(y) {
  const center = getWaveCenterX(y);
  const width = getWaveWidthAt(y);
  return center + width * 0.15; // Slightly toward lip
}

function isInSweetSpot(x, y) {
  const ssCenter = getSweetSpotCenter(y);
  return Math.abs(x - ssCenter) < sweetSpotWidth * 0.5;
}

function isOnWave(x, y) {
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return x > left + 8 && x < right - 8 && y > WAKE_ORIGIN_Y + 20 && y < H - 20;
}

// ══════════════════════════════════════════════
//  PUMP DETECTION
// ══════════════════════════════════════════════
function detectPump() {
  const now = performance.now();
  betaHistory.push({ t: now, v: inputBeta });
  // Keep 2 seconds of history
  while (betaHistory.length > 0 && now - betaHistory[0].t > 2000) {
    betaHistory.shift();
  }
  if (betaHistory.length < 6 || pumpCooldown > 0) {
    pumpCooldown = Math.max(0, pumpCooldown - 1);
    return false;
  }

  // Look for zero crossings in beta
  let crossings = 0;
  let lastSign = Math.sign(betaHistory[0].v);
  let crossTimes = [];
  for (let i = 1; i < betaHistory.length; i++) {
    const s = Math.sign(betaHistory[i].v);
    if (s !== 0 && s !== lastSign) {
      crossings++;
      crossTimes.push(betaHistory[i].t);
      lastSign = s;
    }
  }

  if (crossTimes.length >= 3) {
    const period = (crossTimes[crossTimes.length - 1] - crossTimes[0]) / (crossTimes.length - 1) * 2;
    const freq = 1000 / period;
    if (freq >= PUMP_FREQ_MIN && freq <= PUMP_FREQ_MAX) {
      // Check amplitude
      const vals = betaHistory.map(b => b.v);
      const amplitude = Math.max(...vals) - Math.min(...vals);
      if (amplitude > 0.3) {
        pumpCooldown = 15;
        pumpCount++;
        return true;
      }
    }
  }
  return false;
}

// ══════════════════════════════════════════════
//  PHYSICS UPDATE
// ══════════════════════════════════════════════
function updatePhysics() {
  if (gameState !== 'riding' && gameState !== 'airborne') return;

  processInput();

  if (gameState === 'riding') {
    // Lateral movement (gamma → carving across wave face)
    const carveForce = inputGamma * 0.35;
    surfer.vx += carveForce;
    surfer.vx *= DRAG;
    surfer.vx = Math.max(-MAX_VEL, Math.min(MAX_VEL, surfer.vx));

    // Fore/aft movement (beta → toward/away from boat)
    const foreAftForce = -inputBeta * 0.25;
    surfer.vy += foreAftForce;
    // Wave push — naturally pushes surfer forward (toward boat = up)
    surfer.vy -= WAVE_PUSH + surfer.speed * 0.01;
    surfer.vy *= DRAG;
    surfer.vy = Math.max(-MAX_VEL * 0.6, Math.min(MAX_VEL * 0.6, surfer.vy));

    // Apply velocity
    surfer.x += surfer.vx;
    surfer.y += surfer.vy;

    // Pump detection
    if (detectPump()) {
      surfer.speed = Math.min(surfer.speed + PUMP_BOOST, 5);
      showTrick('PUMP! +speed', '#44ff88');
      addScore(15);
    }
    surfer.speed *= 0.997; // Slow speed decay

    // Carve detection — big lateral speed changes
    if (Math.abs(surfer.vx) > 3.5) {
      totalCarves++;
      addScore(CARVE_BONUS);
      // Spray on carve
      const dir = Math.sign(surfer.vx);
      for (let i = 0; i < 8; i++) {
        spawnSpray(
          surfer.x - dir * 12,
          surfer.y + 15,
          -dir * (2 + Math.random() * 4),
          -(1 + Math.random() * 3),
          0.8
        );
      }
    }

    // Air launch — near lip with enough speed
    const wavePos = getWavePosition(surfer.x, surfer.y);
    if (wavePos > 0.85 && surfer.speed > 2 && Math.abs(surfer.vx) > 2) {
      gameState = 'airborne';
      surfer.onWave = false;
      surfer.airTime = 0;
      surfer.airStartY = surfer.y;
      surfer.airVx = surfer.vx * 0.8;
      surfer.airVy = -(3 + surfer.speed * 0.8);
      totalAirs++;
      showTrick('AIR!', '#00e5ff');
      addScore(AIR_BONUS);
      // Launch spray
      for (let i = 0; i < 15; i++) {
        spawnSpray(surfer.x, surfer.y + 10, (Math.random()-0.5)*6, -(2+Math.random()*4), 1.2);
      }
    }

    // Sweet spot bonus
    if (isInSweetSpot(surfer.x, surfer.y)) {
      addScore(SWEET_SPOT_BONUS);
      comboTimer = performance.now();
    }

    // Regular points
    addScore(POINTS_PER_FRAME);
    rideTime++;

    // Check fall conditions
    checkFall();

    // Visual state
    surfer.rotation = surfer.vx * 0.06;
    surfer.kneeCompress = Math.abs(inputBeta) * 0.5 + (pumpCooldown > 0 ? 0.3 : 0);
    surfer.boardAngle = surfer.vx * 0.04;

  } else if (gameState === 'airborne') {
    // Parabolic arc
    surfer.airTime++;
    surfer.airVy += GRAVITY;
    surfer.x += surfer.airVx;
    surfer.y += surfer.airVy;
    surfer.rotation = surfer.airVx * 0.1 + surfer.airTime * 0.05;
    surfer.kneeCompress = 0.7;
    surfer.armSpread = 1.0;

    // Check landing
    if (surfer.y >= surfer.airStartY && surfer.airTime > 10) {
      if (isOnWave(surfer.x, surfer.y)) {
        // Successful landing!
        gameState = 'riding';
        surfer.onWave = true;
        surfer.vx = surfer.airVx * 0.5;
        surfer.vy = 0;
        addScore(LAND_BONUS);
        showTrick('LANDED! +' + LAND_BONUS, '#ffd700');
        combo++;
        if (combo > bestCombo) bestCombo = combo;
        // Landing splash
        for (let i = 0; i < 20; i++) {
          spawnSpray(surfer.x, surfer.y + 10, (Math.random()-0.5)*5, -(1+Math.random()*3), 1);
        }
      } else {
        endGame();
        return;
      }
    }

    // Fell too far
    if (surfer.y > H + 50 || surfer.x < -50 || surfer.x > W + 50) {
      endGame();
      return;
    }
  }

  // Difficulty ramp
  difficultyTimer++;
  if (difficultyTimer % (60 * 30) === 0) { // every 30 seconds
    difficulty++;
    waveWidth = Math.max(80, WAVE_WIDTH_BASE - difficulty * 10);
    sweetSpotWidth = Math.max(25, 60 - difficulty * 5);
    turbulence = Math.min(1, difficulty * 0.15);
    scrollSpeed = Math.min(5, 3 + difficulty * 0.3);
  }

  // Combo decay
  if (performance.now() - comboTimer > COMBO_DECAY_TIME && combo > 1) {
    combo = Math.max(1, combo - 1);
  }
}

function checkFall() {
  // Off wave
  if (!isOnWave(surfer.x, surfer.y)) {
    endGame();
    return;
  }

  // Too close to boat
  if (surfer.y < BOAT_Y + 50) {
    showTrick('HIT THE BOAT!', '#ff4444');
    endGame();
    return;
  }

  // Fell behind (too far back)
  if (surfer.y > H - 30) {
    showTrick('LOST THE WAVE!', '#ff4444');
    endGame();
    return;
  }
}

function addScore(pts) {
  score += pts * combo;
}

function showTrick(text, color) {
  trickText = text;
  trickTimer = 90;
  document.getElementById('trick-display').textContent = text;
  document.getElementById('trick-display').style.color = color || '#00e5ff';
  document.getElementById('trick-display').style.opacity = '1';
}

// ══════════════════════════════════════════════
//  PARTICLES & EFFECTS
// ══════════════════════════════════════════════
function spawnSpray(x, y, vx, vy, size) {
  sprayParticles.push({
    x, y, vx, vy,
    size: size + Math.random() * 2,
    life: 40 + Math.random() * 30,
    maxLife: 40 + Math.random() * 30,
    alpha: 0.8 + Math.random() * 0.2
  });
}

function updateParticles() {
  for (let i = sprayParticles.length - 1; i >= 0; i--) {
    const p = sprayParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity on droplets
    p.life--;
    if (p.life <= 0) {
      sprayParticles.splice(i, 1);
    }
  }

  // Foam trail behind board
  if (gameState === 'riding') {
    foamTrail.push({
      x: surfer.x,
      y: surfer.y + 18,
      life: 80,
      maxLife: 80,
      size: 3 + Math.abs(surfer.vx) * 0.8
    });
  }
  for (let i = foamTrail.length - 1; i >= 0; i--) {
    foamTrail[i].y += scrollSpeed * 0.3;
    foamTrail[i].life--;
    if (foamTrail[i].life <= 0) foamTrail.splice(i, 1);
  }
  if (foamTrail.length > 120) foamTrail.splice(0, foamTrail.length - 120);

  // Board spray when riding
  if (gameState === 'riding' && Math.abs(surfer.vx) > 1) {
    const sprayIntensity = Math.abs(surfer.vx) / MAX_VEL;
    if (Math.random() < sprayIntensity) {
      const dir = -Math.sign(surfer.vx);
      spawnSpray(
        surfer.x + dir * 8,
        surfer.y + 14,
        dir * (1 + Math.random() * 2 * sprayIntensity),
        -(0.5 + Math.random() * 2 * sprayIntensity),
        0.5 + sprayIntensity
      );
    }
  }
}

// ══════════════════════════════════════════════
//  RENDERING — WATER
// ══════════════════════════════════════════════
function drawWater() {
  waterTime += 0.016;
  scrollY = (scrollY + scrollSpeed) % 60;

  // --- Sky/horizon gradient ---
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0b2948');
  skyGrad.addColorStop(0.15, '#0d3a5c');
  skyGrad.addColorStop(0.4, '#0a5a7a');
  skyGrad.addColorStop(1, '#074060');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // --- Flat water with flowing ripples ---
  drawFlatWater();

  // --- Wake wave ---
  drawWakeWave();
}

function drawFlatWater() {
  // Subtle horizontal ripple lines that scroll down
  ctx.globalAlpha = 0.12;
  for (let y = -60 + (scrollY % 30); y < H; y += 30) {
    const wave = Math.sin(y * 0.03 + waterTime * 1.5) * 15;
    ctx.strokeStyle = '#4db8d4';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    for (let x = 0; x < W; x += 4) {
      const yy = y + Math.sin((x + wave) * 0.04 + waterTime * 2) * 3;
      if (x === 0) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    }
    ctx.stroke();
  }

  // Light reflections / glints
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#8fdfff';
  for (let i = 0; i < 20; i++) {
    const rx = ((i * 97 + waterTime * 40) % W);
    const ry = ((i * 131 + scrollY) % H);
    const sz = 1 + Math.sin(waterTime * 3 + i) * 1;
    if (sz > 0.5) {
      ctx.fillRect(rx, ry, sz * 3, sz);
    }
  }
  ctx.globalAlpha = 1;
}

function drawWakeWave() {
  // The wake is a V-shaped area spreading from the boat
  // Left side = trough (dark), center = face, right side = lip (bright/foamy)

  for (let y = WAKE_ORIGIN_Y + 10; y < H; y += 1) {
    const left = getWaveLeftEdge(y);
    const right = getWaveRightEdge(y);
    const w = right - left;
    if (w <= 0) continue;

    // Wave face gradient — dark trough to bright lip
    const grad = ctx.createLinearGradient(left, 0, right, 0);
    const depthFactor = (y - WAKE_ORIGIN_Y) / (H - WAKE_ORIGIN_Y);

    // Trough: deep dark blue
    grad.addColorStop(0, `rgba(4,40,70,${0.7 + depthFactor * 0.3})`);
    // Lower face: medium blue
    grad.addColorStop(0.2, `rgba(10,80,130,${0.6 + depthFactor * 0.3})`);
    // Mid face: catching light
    grad.addColorStop(0.5, `rgba(20,140,180,${0.5 + depthFactor * 0.3})`);
    // Upper face: bright teal
    grad.addColorStop(0.75, `rgba(40,190,210,${0.6 + depthFactor * 0.2})`);
    // Lip: white/foam
    grad.addColorStop(0.92, `rgba(140,230,240,${0.5 + depthFactor * 0.3})`);
    grad.addColorStop(1, `rgba(200,245,255,${0.4 + depthFactor * 0.2})`);

    ctx.fillStyle = grad;
    ctx.fillRect(left, y, w, 1.5);
  }

  // Wave lip foam line — right edge of wake
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = '#c0f0ff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let y = WAKE_ORIGIN_Y + 20; y < H; y += 3) {
    const right = getWaveRightEdge(y);
    const jitter = Math.sin(y * 0.1 + waterTime * 5) * 2;
    if (y === WAKE_ORIGIN_Y + 20) ctx.moveTo(right + jitter, y);
    else ctx.lineTo(right + jitter, y);
  }
  ctx.stroke();

  // Trough shadow — left edge
  ctx.strokeStyle = 'rgba(0,20,40,0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let y = WAKE_ORIGIN_Y + 20; y < H; y += 3) {
    const left = getWaveLeftEdge(y);
    const jitter = Math.sin(y * 0.08 + waterTime * 4) * 1.5;
    if (y === WAKE_ORIGIN_Y + 20) ctx.moveTo(left + jitter, y);
    else ctx.lineTo(left + jitter, y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Foam streaks on the wave face
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#b0eeff';
  for (let i = 0; i < 12; i++) {
    const fy = WAKE_ORIGIN_Y + 60 + ((i * 53 + scrollY * 2) % (H - WAKE_ORIGIN_Y - 80));
    const left = getWaveLeftEdge(fy);
    const right = getWaveRightEdge(fy);
    const fx = left + (right - left) * (0.3 + Math.sin(i * 2.7 + waterTime) * 0.2);
    const fLen = 10 + Math.sin(i * 1.3 + waterTime * 2) * 8;
    ctx.fillRect(fx, fy, fLen, 1.5);
  }
  ctx.globalAlpha = 1;

  // Sweet spot indicator — subtle glow
  if (gameState === 'riding') {
    const ssCenter = getSweetSpotCenter(surfer.y);
    const ssHalf = sweetSpotWidth * 0.5;
    const ssGrad = ctx.createRadialGradient(ssCenter, surfer.y, 0, ssCenter, surfer.y, ssHalf + 10);
    ssGrad.addColorStop(0, 'rgba(0,255,200,0.08)');
    ssGrad.addColorStop(1, 'rgba(0,255,200,0)');
    ctx.fillStyle = ssGrad;
    ctx.fillRect(ssCenter - ssHalf - 10, surfer.y - 40, sweetSpotWidth + 20, 80);
  }
}

// ══════════════════════════════════════════════
//  RENDERING — BOAT
// ══════════════════════════════════════════════
function drawBoat() {
  const bx = W * 0.5;
  const by = BOAT_Y;
  const bob = Math.sin(waterTime * 2.5) * 2;

  ctx.save();
  ctx.translate(bx, by + bob);

  // Hull
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath();
  ctx.moveTo(-22, 5);
  ctx.quadraticCurveTo(-25, 15, -18, 22);
  ctx.lineTo(18, 22);
  ctx.quadraticCurveTo(25, 15, 22, 5);
  ctx.lineTo(15, -5);
  ctx.quadraticCurveTo(0, -12, -15, -5);
  ctx.closePath();
  ctx.fill();

  // Hull accent
  ctx.fillStyle = '#cc3333';
  ctx.beginPath();
  ctx.moveTo(-20, 12);
  ctx.lineTo(20, 12);
  ctx.lineTo(18, 18);
  ctx.lineTo(-18, 18);
  ctx.closePath();
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(100,200,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(-8, -2);
  ctx.lineTo(8, -2);
  ctx.lineTo(6, -8);
  ctx.lineTo(-6, -8);
  ctx.closePath();
  ctx.fill();

  // Tower/pylon
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-5, -8);
  ctx.lineTo(-3, -22);
  ctx.lineTo(3, -22);
  ctx.lineTo(5, -8);
  ctx.stroke();

  // Rope from tower to surfer
  if (gameState === 'riding' || gameState === 'airborne') {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(0, 22);
    const ropeEndX = surfer.x - bx;
    const ropeEndY = surfer.y - (by + bob);
    // Slight sag curve
    const midX = ropeEndX * 0.5;
    const midY = ropeEndY * 0.5 + 15;
    ctx.quadraticCurveTo(midX, midY, ropeEndX, ropeEndY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Wake from boat motor
  ctx.fillStyle = 'rgba(200,240,255,0.25)';
  for (let i = 0; i < 6; i++) {
    const wy = 24 + i * 6;
    const wx = Math.sin(waterTime * 5 + i) * (2 + i);
    ctx.beginPath();
    ctx.ellipse(wx, wy, 4 + i * 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ══════════════════════════════════════════════
//  RENDERING — SURFER
// ══════════════════════════════════════════════
function drawSurfer() {
  const sx = surfer.x;
  const sy = surfer.y + getWaveSurfaceY(surfer.x, surfer.y) * (surfer.onWave ? 1 : 0);

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(surfer.rotation);

  const compress = surfer.kneeCompress;
  const lean = surfer.vx * 0.02;

  // ── Board ──
  ctx.save();
  ctx.rotate(surfer.boardAngle);

  // Board shadow
  ctx.fillStyle = 'rgba(0,20,40,0.3)';
  ctx.beginPath();
  ctx.ellipse(1, 19, 18, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Board body
  const boardGrad = ctx.createLinearGradient(-16, 12, 16, 12);
  boardGrad.addColorStop(0, '#f0f0f0');
  boardGrad.addColorStop(0.5, '#ffffff');
  boardGrad.addColorStop(1, '#e8e8e8');
  ctx.fillStyle = boardGrad;
  ctx.beginPath();
  ctx.moveTo(0, -2);
  ctx.quadraticCurveTo(16, 4, 15, 16);
  ctx.quadraticCurveTo(10, 25, 0, 27);
  ctx.quadraticCurveTo(-10, 25, -15, 16);
  ctx.quadraticCurveTo(-16, 4, 0, -2);
  ctx.closePath();
  ctx.fill();

  // Board stripe
  ctx.fillStyle = '#ff3366';
  ctx.beginPath();
  ctx.moveTo(-2, 2);
  ctx.lineTo(2, 2);
  ctx.lineTo(2, 22);
  ctx.lineTo(-2, 22);
  ctx.closePath();
  ctx.fill();

  // Fins
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(-5, 22);
  ctx.lineTo(-4, 28);
  ctx.lineTo(-7, 26);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5, 22);
  ctx.lineTo(4, 28);
  ctx.lineTo(7, 26);
  ctx.closePath();
  ctx.fill();

  // Rail spray when carving hard
  if (gameState === 'riding' && Math.abs(surfer.vx) > 2) {
    const sprayAlpha = Math.min(0.6, (Math.abs(surfer.vx) - 2) / 4);
    const dir = Math.sign(surfer.vx);
    ctx.globalAlpha = sprayAlpha;
    ctx.fillStyle = '#c0f0ff';
    for (let i = 0; i < 5; i++) {
      const sx2 = -dir * (12 + i * 3 + Math.random() * 4);
      const sy2 = 10 + i * 3;
      ctx.beginPath();
      ctx.ellipse(sx2, sy2, 2 + Math.random() * 2, 1, lean, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore(); // board transform

  // ── Body ──
  const bodyOffsetY = -6 + compress * 8;

  // Legs
  const legSpread = 6 + compress * 3;
  const legHeight = 12 - compress * 5;
  ctx.fillStyle = '#2a2a2a';
  // Back leg
  ctx.beginPath();
  ctx.moveTo(-legSpread, bodyOffsetY + 14);
  ctx.lineTo(-legSpread - 1, bodyOffsetY + 14 + legHeight);
  ctx.lineTo(-legSpread + 3, bodyOffsetY + 14 + legHeight);
  ctx.lineTo(-legSpread + 2, bodyOffsetY + 14);
  ctx.closePath();
  ctx.fill();
  // Front leg
  ctx.beginPath();
  ctx.moveTo(legSpread - 2, bodyOffsetY + 14);
  ctx.lineTo(legSpread - 3, bodyOffsetY + 14 + legHeight);
  ctx.lineTo(legSpread + 1, bodyOffsetY + 14 + legHeight);
  ctx.lineTo(legSpread, bodyOffsetY + 14);
  ctx.closePath();
  ctx.fill();

  // Torso
  const torsoGrad = ctx.createLinearGradient(0, bodyOffsetY, 0, bodyOffsetY + 14);
  torsoGrad.addColorStop(0, '#1a8ccc');
  torsoGrad.addColorStop(1, '#1570a5');
  ctx.fillStyle = torsoGrad;
  ctx.beginPath();
  ctx.moveTo(-6 + lean * 5, bodyOffsetY);
  ctx.lineTo(6 + lean * 5, bodyOffsetY);
  ctx.lineTo(8 + lean * 3, bodyOffsetY + 14);
  ctx.lineTo(-8 + lean * 3, bodyOffsetY + 14);
  ctx.closePath();
  ctx.fill();

  // Arms
  const armY = bodyOffsetY + 4;
  const armLength = 10 + surfer.armSpread * 6;
  const armAngle = lean * 0.5;
  ctx.strokeStyle = '#e8b87a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-6 + lean * 4, armY);
  ctx.lineTo(-6 - armLength * Math.cos(armAngle + 0.3), armY - armLength * Math.sin(armAngle + 0.3) * 0.5);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(6 + lean * 4, armY);
  ctx.lineTo(6 + armLength * Math.cos(-armAngle + 0.3), armY - armLength * Math.sin(-armAngle + 0.3) * 0.5);
  ctx.stroke();

  // Hands
  ctx.fillStyle = '#e8b87a';
  ctx.beginPath();
  ctx.arc(-6 - armLength * Math.cos(armAngle + 0.3), armY - armLength * Math.sin(armAngle + 0.3) * 0.5, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6 + armLength * Math.cos(-armAngle + 0.3), armY - armLength * Math.sin(-armAngle + 0.3) * 0.5, 2, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#e8b87a';
  ctx.beginPath();
  ctx.arc(lean * 6, bodyOffsetY - 6, 6, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.arc(lean * 6, bodyOffsetY - 8, 5, Math.PI, Math.PI * 2);
  ctx.fill();
  // Hair flow
  ctx.beginPath();
  ctx.moveTo(lean * 6 + 4, bodyOffsetY - 9);
  ctx.quadraticCurveTo(lean * 6 + 8, bodyOffsetY - 7, lean * 6 + 6 - surfer.vx * 0.5, bodyOffsetY - 4);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#3a2a1a';
  ctx.stroke();

  ctx.restore();
}

// ══════════════════════════════════════════════
//  RENDERING — EFFECTS
// ══════════════════════════════════════════════
function drawEffects() {
  // Foam trail
  for (const f of foamTrail) {
    const alpha = (f.life / f.maxLife) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#b0eeff';
    ctx.beginPath();
    ctx.ellipse(f.x, f.y, f.size, f.size * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Spray particles
  for (const p of sprayParticles) {
    const alpha = (p.life / p.maxLife) * p.alpha;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#d0f5ff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ══════════════════════════════════════════════
//  HUD UPDATE
// ══════════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-display').textContent = score;

  if (combo > 1) {
    document.getElementById('combo-display').textContent = 'x' + combo + ' COMBO';
    document.getElementById('combo-display').style.opacity = '1';
  } else {
    document.getElementById('combo-display').style.opacity = '0';
  }

  if (trickTimer > 0) {
    trickTimer--;
    if (trickTimer <= 20) {
      document.getElementById('trick-display').style.opacity = (trickTimer / 20).toString();
    }
  }

  if (gameRunning) {
    const secs = Math.floor(rideTime / 60);
    document.getElementById('time-display').textContent = secs + 's';
  }
}

// ══════════════════════════════════════════════
//  MAIN GAME LOOP
// ══════════════════════════════════════════════
function gameLoop() {
  // Clear
  ctx.clearRect(0, 0, W, H);

  // Water background
  drawWater();

  // Boat
  drawBoat();

  if (gameRunning) {
    updatePhysics();
    updateParticles();
  }

  // Effects behind surfer
  drawEffects();

  // Surfer
  if (gameState !== 'waiting') {
    drawSurfer();
  }

  // HUD
  updateHUD();

  requestAnimationFrame(gameLoop);
}

// Start the render loop
gameLoop();
</script>
