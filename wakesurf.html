<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakesurf Game</title>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1628;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
canvas { display: block; }
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
#qr-container {
  background: rgba(0,0,0,0.85);
  border: 3px solid #00e5ff;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  pointer-events: auto;
}
#qr-container h2 {
  color: #00e5ff;
  font-size: 18px;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
#qr-container p {
  color: #88ccdd;
  font-size: 13px;
  margin-top: 12px;
}
#qr-box { margin: 0 auto; }
#status {
  color: #ffcc00;
  font-size: 14px;
  margin-top: 8px;
}
#score-display {
  position: absolute;
  top: 16px;
  right: 24px;
  color: #fff;
  font-size: 24px;
  text-shadow: 2px 2px 0 #000;
  z-index: 5;
}
#combo-display {
  position: absolute;
  top: 46px;
  right: 24px;
  color: #ffcc00;
  font-size: 16px;
  text-shadow: 2px 2px 0 #000;
  z-index: 5;
  display: none;
}
#game-over-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
}
#game-over-overlay h1 {
  color: #ff4444;
  font-size: 48px;
  text-shadow: 3px 3px 0 #000;
  margin-bottom: 12px;
}
#game-over-overlay p {
  color: #fff;
  font-size: 24px;
}
#game-over-overlay .sub {
  color: #88ccdd;
  font-size: 16px;
  margin-top: 8px;
}
#keyboard-hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: #556;
  font-size: 12px;
  z-index: 5;
}
#version {
  position: fixed;
  bottom: 4px;
  right: 8px;
  color: #556;
  font-size: 10px;
  z-index: 50;
  pointer-events: none;
}
#back-btn {
  position: fixed;
  top: 8px;
  left: 8px;
  color: #556;
  font-size: 12px;
  z-index: 50;
  cursor: pointer;
  background: none;
  border: 1px solid #334;
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'Courier New', monospace;
}
#back-btn:hover { color: #00e5ff; border-color: #00e5ff; }
#mode-selector {
  display: none;
  flex-direction: row;
  gap: 12px;
  margin-top: 16px;
  justify-content: center;
}
#mode-selector button {
  background: rgba(0,0,0,0.85);
  color: #00e5ff;
  border: 2px solid #00e5ff;
  border-radius: 8px;
  padding: 10px 28px;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background 0.2s;
}
#mode-selector button:hover {
  background: rgba(0,229,255,0.15);
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="score-display">SCORE: 0</div>
<div id="combo-display"></div>
<div id="keyboard-hint">Arrow keys to steer &bull; Space to restart</div>
<div id="version">v3.2</div>
<button id="back-btn" onclick="window.location.href='index.html'">&larr; MENU</button>

<div id="overlay">
  <div id="qr-container">
    <h2>Scan to Connect Controller</h2>
    <div id="qr-box"></div>
    <p id="status">Initializing...</p>
    <div id="mode-selector">
      <button id="btn-play" onclick="selectMode()">PLAY</button>
    </div>
  </div>
</div>

<div id="game-over-overlay">
  <h1>WIPEOUT!</h1>
  <p id="final-score">Score: 0</p>
  <p class="sub" id="ride-time">Ride time: 0s</p>
  <p class="sub" id="best-combo">Best combo: x1</p>
  <p class="sub" id="restart-hint">Press SPACE or tap phone to restart</p>
</div>

<script>
// ── Canvas Setup ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W;
canvas.height = H;

function fitCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ── Game Constants ──
const BOAT_BOTTOM = 80;
const DANGER_FRONT = 140;
const SAFE_TOP = 160;
const SAFE_BOTTOM = 530;
const DANGER_BACK = 580;
const OFF_WAVE_BACK = 620;

// ── Game State ──
const STATE = { WAITING: 0, PLAYING: 1, FALLING: 2, GAME_OVER: 3 };
let gameState = STATE.WAITING;

let rider = { x: W * 0.4, y: H * 0.5, w: 60, h: 90, vx: 0, vy: 0,
              airborne: false, airTime: 0, airHeight: 0, launchSpeed: 0 };
let score = 0;
let frameCount = 0;
let rideStartTime = 0;
let combo = 1;
let comboTimer = 0;
let bestCombo = 1;
let floatingTexts = [];
let particles = [];
let foamParticles = [];

// Wave / difficulty
let waveNarrowFactor = 1.0;
let sweetSpotSize = 1.0;
let turbulenceLevel = 0;
let wavePushForce = 0.04;
let difficultyLevel = 1;
let difficultyTimer = 0;
let rogueWaveTimer = 0;
let rogueWaveActive = false;

// Gyro input
let gyroGamma = 0;    // left-right
let gyroBeta = 0;     // fore-aft
let prevSensorGamma = 0, lastSensorGamma = 0;
let prevSensorBeta = 0, lastSensorBeta = 0;
let sensorTimestamp = 0;
let sensorInterval = 33; // ~30Hz from controller

// Pump detection
let betaHistory = [];
let pumpActive = false;
let pumpBoost = 0;

// Fall
let fallType = '';
let fallTimer = 0;
let fallRotation = 0;
let fallVx = 0, fallVy = 0;
let dangerFrontTimer = 0;
let dangerBackTimer = 0;
let offWaveTimer = 0;

// Carve detection
let lastCarveDir = 0;
let carveSpeed = 0;
let carveDuration = 0;

// Boat bob
let boatBob = 0;

// Connection
let controllerConnected = false;
let conn = null;
let gameRunning = false;

// ── Keyboard ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' && gameState === STATE.GAME_OVER) restartGame();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ── PeerJS ──
const peer = new Peer(null, {
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  }
});

peer.on('open', id => {
  document.getElementById('status').textContent = 'Waiting for controller...';
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  const url = base + 'controller.html?id=' + id;
  document.getElementById('qr-box').innerHTML = '';
  new QRCode(document.getElementById('qr-box'), {
    text: url, width: 200, height: 200,
    colorDark: '#00e5ff', colorLight: '#0a1628'
  });
});

peer.on('error', err => {
  document.getElementById('status').textContent = 'Connection error: ' + err.type;
});

peer.on('connection', c => {
  if (conn) { c.close(); return; }
  conn = c;
  controllerConnected = true;
  document.getElementById('status').textContent = 'Controller connected!';

  c.on('open', () => {
    c.send(JSON.stringify({ type: 'connected' }));
    setTimeout(() => {
      document.getElementById('keyboard-hint').style.display = 'none';
      document.getElementById('mode-selector').style.display = 'flex';
    }, 800);
  });

  c.on('data', raw => {
    const msg = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (msg.type === 'gyro') {
      prevSensorGamma = lastSensorGamma;
      prevSensorBeta = lastSensorBeta;
      lastSensorGamma = msg.gamma;
      lastSensorBeta = msg.beta;
      sensorTimestamp = performance.now();
    } else if (msg.type === 'restart') {
      if (gameState === STATE.GAME_OVER) restartGame();
    }
  });

  c.on('close', () => {
    conn = null;
    controllerConnected = false;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('status').textContent = 'Controller disconnected. Scan again.';
  });
});

// Show keyboard hint after delay
setTimeout(() => {
  if (!controllerConnected) {
    document.getElementById('overlay').style.opacity = '0.6';
  }
}, 3000);

window.addEventListener('keydown', e => {
  if (!controllerConnected && gameState === STATE.WAITING &&
      (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
    document.getElementById('mode-selector').style.display = 'flex';
  }
});

// ── Mode Selection ──
function selectMode() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('keyboard-hint').style.display = 'none';
  startGame();
}

// ── Wave Geometry ──
function getWaveLeftEdge(y) {
  const progress = Math.max(0, (y - BOAT_BOTTOM) / (SAFE_BOTTOM - BOAT_BOTTOM));
  const narrow = rogueWaveActive ? waveNarrowFactor * 0.6 : waveNarrowFactor;
  return 50 + (1 - progress) * 40 * narrow;
}

function getWaveRightEdge(y) {
  const progress = Math.max(0, (y - BOAT_BOTTOM) / (SAFE_BOTTOM - BOAT_BOTTOM));
  const narrow = rogueWaveActive ? waveNarrowFactor * 0.6 : waveNarrowFactor;
  return 140 + progress * 220 * narrow;
}

function getSweetSpotCenter(y) {
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return left + (right - left) * 0.55;
}

function getSweetSpotRadius(y) {
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return (right - left) * 0.2 * sweetSpotSize;
}

function isInSweetSpot(x, y) {
  const center = getSweetSpotCenter(y);
  const radius = getSweetSpotRadius(y);
  return Math.abs(x - center) < radius && y > SAFE_TOP && y < SAFE_BOTTOM;
}

function isOnWave(x, y) {
  if (y < DANGER_FRONT || y > DANGER_BACK) return false;
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return x > left && x < right;
}

function isInDangerZone(x, y) {
  if (y < DANGER_FRONT && y > BOAT_BOTTOM) return 'front';
  if (y > SAFE_BOTTOM && y < OFF_WAVE_BACK) return 'back';
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  if (x < left + 15 || x > right - 15) return 'edge';
  return false;
}

// ── Gyro Processing (improved) ──
function processGyro(dt) {
  let gamma, beta;

  if (controllerConnected) {
    // Interpolate between sensor readings for smooth 60fps
    const elapsed = performance.now() - sensorTimestamp;
    const t = Math.min(1.5, elapsed / sensorInterval);
    gamma = lastSensorGamma + (lastSensorGamma - prevSensorGamma) * (t - 1) * 0.6;
    beta = lastSensorBeta + (lastSensorBeta - prevSensorBeta) * (t - 1) * 0.6;

    // Bias compensation
    gamma += 1.3;
    beta -= 1.3;
  } else {
    // Keyboard fallback
    gamma = 0; beta = 0;
    if (keys['ArrowLeft']) gamma = -6;
    if (keys['ArrowRight']) gamma = 6;
    if (keys['ArrowUp']) beta = -4;
    if (keys['ArrowDown']) beta = 4;
  }

  // Dead zone ±1°
  if (Math.abs(gamma) < 1) gamma = 0;
  else gamma = gamma - Math.sign(gamma) * 1;

  if (Math.abs(beta) < 1) beta = 0;
  else beta = beta - Math.sign(beta) * 1;

  // Clamp to ±8° range
  gamma = Math.max(-8, Math.min(8, gamma));
  beta = Math.max(-8, Math.min(8, beta));

  // Normalize to -1..1
  gyroGamma = gamma / 7; // after dead zone subtraction, max is 7
  gyroBeta = beta / 7;

  // Fall detection: rapid beta plunge
  if (controllerConnected) {
    const betaRate = Math.abs(lastSensorBeta - prevSensorBeta);
    if (betaRate > 10) {
      triggerFall('flail');
      return;
    }
    // Extreme tilt
    if (Math.abs(lastSensorGamma) > 25 || Math.abs(lastSensorBeta) > 25) {
      triggerFall('flail');
      return;
    }
  }
}

// ── Pump Detection ──
function detectPump() {
  betaHistory.push({ val: gyroBeta, t: performance.now() });
  // Keep 2 second window
  const cutoff = performance.now() - 2000;
  while (betaHistory.length > 0 && betaHistory[0].t < cutoff) betaHistory.shift();

  if (betaHistory.length < 6) { pumpActive = false; return; }

  // Count zero crossings
  let crossings = 0;
  for (let i = 1; i < betaHistory.length; i++) {
    if ((betaHistory[i].val > 0) !== (betaHistory[i-1].val > 0)) crossings++;
  }

  // 3-6 crossings in 2s = valid pump (0.75-1.5 Hz)
  if (crossings >= 3 && crossings <= 6) {
    // Check amplitude
    let maxVal = 0;
    for (const b of betaHistory) maxVal = Math.max(maxVal, Math.abs(b.val));
    if (maxVal > 0.25) { // ~2° after normalization
      pumpActive = true;
      pumpBoost = Math.min(pumpBoost + 0.02, 1.5);
      return;
    }
  }
  pumpActive = false;
  pumpBoost = Math.max(0, pumpBoost - 0.01);
}

// ── Physics ──
function updatePhysics(dt) {
  if (rider.airborne) {
    // Parabolic arc
    rider.airTime += dt;
    rider.airHeight -= 3 * dt; // gravity
    rider.vy = 0;
    rider.x += rider.vx * 0.5;
    // Land when airHeight <= 0
    if (rider.airHeight <= 0) {
      rider.airborne = false;
      rider.airHeight = 0;
      // Landing score
      const airScore = Math.round(rider.launchSpeed * 10 + rider.airTime * 30);
      addScore(airScore, 'AIR!');
      addScore(50, 'CLEAN LAND');
      spawnSplash(rider.x, rider.y, 8);
      rider.airTime = 0;
    }
    return;
  }

  // Lateral force from gamma
  const lateralForce = gyroGamma * 0.4;
  rider.vx += lateralForce;

  // Vertical force from beta + wave push
  const verticalForce = gyroBeta * 0.35;
  rider.vy += verticalForce;
  rider.vy -= wavePushForce; // wave pushes rider toward boat (negative y)

  // Pump boost — extra forward resistance (counteract wave push)
  if (pumpActive) {
    rider.vy += 0.06;
  }

  // Speed bonus dropping from lip to trough (right to left, high x to low x)
  const waveCenter = getSweetSpotCenter(rider.y);
  const waveRight = getWaveRightEdge(rider.y);
  if (rider.vx < -1 && rider.x > waveCenter) {
    // Carving left from high on face — speed bonus
    carveSpeed = Math.abs(rider.vx);
    carveDuration++;
    const carveDir = -1;
    if (lastCarveDir !== carveDir && lastCarveDir !== 0 && carveDuration > 10) {
      // Direction change = completed carve
      const carveScore = Math.round(carveSpeed * carveDuration * 0.1);
      if (carveScore > 5) addScore(carveScore, 'CARVE');
      carveDuration = 0;
    }
    lastCarveDir = carveDir;
  } else if (rider.vx > 1 && rider.x < waveCenter) {
    carveSpeed = Math.abs(rider.vx);
    carveDuration++;
    const carveDir = 1;
    if (lastCarveDir !== carveDir && lastCarveDir !== 0 && carveDuration > 10) {
      const carveScore = Math.round(carveSpeed * carveDuration * 0.1);
      if (carveScore > 5) addScore(carveScore, 'CARVE');
      carveDuration = 0;
    }
    lastCarveDir = carveDir;
  } else {
    carveDuration = 0;
  }

  // Turbulence
  if (turbulenceLevel > 0) {
    rider.vx += (Math.random() - 0.5) * turbulenceLevel * 0.15;
    rider.vy += (Math.random() - 0.5) * turbulenceLevel * 0.1;
  }

  // Drag
  rider.vx *= 0.96;
  rider.vy *= 0.94;

  // Clamp velocity
  rider.vx = Math.max(-8, Math.min(8, rider.vx));
  rider.vy = Math.max(-6, Math.min(6, rider.vy));

  // Edge springs — wave boundaries
  const leftEdge = getWaveLeftEdge(rider.y);
  const rightEdge = getWaveRightEdge(rider.y);

  if (rider.x < leftEdge + 20) {
    rider.vx += (leftEdge + 20 - rider.x) * 0.12;
  }
  if (rider.x > rightEdge - 20) {
    rider.vx -= (rider.x - (rightEdge - 20)) * 0.12;
  }
  // Vertical edges
  if (rider.y < SAFE_TOP) {
    rider.vy += (SAFE_TOP - rider.y) * 0.08;
  }
  if (rider.y > SAFE_BOTTOM) {
    rider.vy -= (rider.y - SAFE_BOTTOM) * 0.08;
  }

  // Apply velocity
  rider.x += rider.vx;
  rider.y += rider.vy;

  // Air launch — near lip with enough rightward speed
  if (rider.x > rightEdge - 30 && rider.vx > 3 && !rider.airborne) {
    rider.airborne = true;
    rider.airTime = 0;
    rider.airHeight = 3 + Math.abs(rider.vx) * 0.8;
    rider.launchSpeed = Math.abs(rider.vx);
    comboHit();
  }

  // Check danger zones
  const danger = isInDangerZone(rider.x, rider.y);
  if (danger === 'front') {
    dangerFrontTimer++;
    if (dangerFrontTimer > 90) triggerFall('boat_crash'); // 1.5s at 60fps
  } else {
    dangerFrontTimer = Math.max(0, dangerFrontTimer - 2);
  }

  if (danger === 'back') {
    dangerBackTimer++;
    if (dangerBackTimer > 90) triggerFall('off_wave');
  } else {
    dangerBackTimer = Math.max(0, dangerBackTimer - 2);
  }

  // Off wave bounds
  if (!isOnWave(rider.x, rider.y) && rider.y > DANGER_FRONT && rider.y < OFF_WAVE_BACK) {
    offWaveTimer++;
    if (offWaveTimer > 30) triggerFall('over_lip'); // 0.5s
  } else {
    offWaveTimer = Math.max(0, offWaveTimer - 2);
  }

  // Hard off-screen
  if (rider.y < BOAT_BOTTOM) triggerFall('boat_crash');
  if (rider.y > OFF_WAVE_BACK) triggerFall('off_wave');
  if (rider.x < 10 || rider.x > W - 10) triggerFall('over_lip');
}

// ── Fall ──
function triggerFall(type) {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.FALLING;
  fallType = type;
  fallTimer = 60; // 1 second
  fallRotation = 0;
  fallVx = rider.vx;
  fallVy = rider.vy;
  if (type === 'boat_crash') { fallVy = -4; fallVx = (Math.random()-0.5)*3; }
  if (type === 'over_lip') { fallVx = 3; fallVy = 2; }
  if (type === 'off_wave') { fallVy = 3; fallVx = (Math.random()-0.5)*2; }
  spawnSplash(rider.x, rider.y, 15);
}

function updateFall() {
  fallTimer--;
  fallRotation += 0.15;
  rider.x += fallVx * 0.5;
  rider.y += fallVy * 0.5;
  fallVy += 0.1;
  // Spawn splash particles during fall
  if (fallTimer % 5 === 0) spawnSplash(rider.x, rider.y, 3);
  if (fallTimer <= 0) {
    spawnSplash(rider.x, rider.y, 20); // big final splash
    gameState = STATE.GAME_OVER;
    showGameOver();
  }
}

// ── Scoring ──
function addScore(pts, label) {
  score += pts * combo;
  floatingTexts.push({
    text: '+' + (pts * combo) + ' ' + label,
    x: rider.x, y: rider.y - 50 - (rider.airborne ? rider.airHeight * 12 : 0),
    life: 60, color: combo > 1 ? '#ffcc00' : '#ffffff'
  });
}

function comboHit() {
  combo++;
  comboTimer = 120; // 2s to keep combo
  if (combo > bestCombo) bestCombo = combo;
}

function updateCombo() {
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 1;
  }
  const el = document.getElementById('combo-display');
  if (combo > 1) {
    el.style.display = 'block';
    el.textContent = 'x' + combo + ' COMBO';
  } else {
    el.style.display = 'none';
  }
}

// ── Difficulty ──
function updateDifficulty() {
  difficultyTimer++;
  if (difficultyTimer % 1800 === 0) { // every ~30s
    difficultyLevel++;
    waveNarrowFactor = Math.max(0.5, waveNarrowFactor - 0.08);
    sweetSpotSize = Math.max(0.4, sweetSpotSize - 0.1);
    turbulenceLevel = Math.min(3, turbulenceLevel + 0.5);
    wavePushForce = Math.min(0.12, wavePushForce + 0.012);
  }
  // Rogue waves at level 5+
  if (difficultyLevel >= 5) {
    rogueWaveTimer++;
    if (!rogueWaveActive && rogueWaveTimer > 600 && Math.random() < 0.003) {
      rogueWaveActive = true;
      rogueWaveTimer = 0;
    }
    if (rogueWaveActive && rogueWaveTimer > 180) { // 3s rogue wave
      rogueWaveActive = false;
      rogueWaveTimer = 0;
    }
  }
}

// ── Particles ──
function spawnSplash(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 25 + Math.random() * 20,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.4 ? '#ffffff' : '#aaeeff'
    });
  }
}

function spawnCarveSpray() {
  const speed = Math.sqrt(rider.vx*rider.vx + rider.vy*rider.vy);
  if (speed < 1.5 || rider.airborne) return;
  const count = Math.min(5, Math.floor(speed / 1.5));
  for (let i = 0; i < count; i++) {
    particles.push({
      x: rider.x - rider.vx * 3,
      y: rider.y + 36,
      vx: -rider.vx * 0.4 + (Math.random()-0.5)*3,
      vy: (Math.random()-0.5)*2 + 1.5,
      life: 18 + Math.random() * 12,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#ffffff' : '#aaeeff'
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 1;
    ft.life--;
    if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
    ctx.globalAlpha = ft.life / 60;
    ctx.fillStyle = ft.color;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ── Rendering ──

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, 25);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.5, '#5BA8D0');
  grad.addColorStop(1, '#3a7898');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 25);
  // Soft horizon blend into water
  const horizGrad = ctx.createLinearGradient(0, 20, 0, 40);
  horizGrad.addColorStop(0, 'rgba(58,120,152,0.8)');
  horizGrad.addColorStop(1, 'rgba(8,56,88,0)');
  ctx.fillStyle = horizGrad;
  ctx.fillRect(0, 20, W, 20);
}

function drawDeepWater() {
  const baseGrad = ctx.createLinearGradient(0, 25, 0, H);
  baseGrad.addColorStop(0, '#083858');
  baseGrad.addColorStop(0.3, '#0a4a7a');
  baseGrad.addColorStop(0.7, '#0c5590');
  baseGrad.addColorStop(1, '#0a4068');
  ctx.fillStyle = baseGrad;
  ctx.fillRect(0, 25, W, H - 25);

  // Subtle shimmer strokes on flat water (left of wave trough)
  ctx.strokeStyle = 'rgba(100,180,220,0.08)';
  ctx.lineWidth = 1;
  for (let y = BOAT_BOTTOM + 20; y < OFF_WAVE_BACK; y += 16) {
    const leftEdge = getWaveLeftEdge(y);
    if (leftEdge < 30) continue;
    ctx.beginPath();
    ctx.moveTo(5, y);
    for (let sx = 5; sx < leftEdge - 10; sx += 20) {
      ctx.quadraticCurveTo(sx + 10, y + Math.sin((sx + frameCount * 0.5) * 0.08) * 3, sx + 20, y);
    }
    ctx.stroke();
  }
}

function drawWaveFace() {
  // Wave face — gradient bands following V-shape
  for (let y = BOAT_BOTTOM; y < OFF_WAVE_BACK; y += 2) {
    const left = getWaveLeftEdge(y);
    const right = getWaveRightEdge(y);
    const w = right - left;
    if (w <= 0) continue;
    const faceGrad = ctx.createLinearGradient(left, 0, right, 0);
    faceGrad.addColorStop(0, '#0a4a7a');
    faceGrad.addColorStop(0.3, '#1a7aaa');
    faceGrad.addColorStop(0.6, '#2cb0d0');
    faceGrad.addColorStop(0.85, '#40d8e8');
    faceGrad.addColorStop(1, '#60f0f0');
    ctx.fillStyle = faceGrad;
    ctx.fillRect(left, y, w, 2);
  }

  // Smooth contour strokes
  const scroll = (frameCount * 0.8) % 24;
  ctx.strokeStyle = 'rgba(120,210,240,0.15)';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  for (let y = BOAT_BOTTOM + scroll; y < OFF_WAVE_BACK; y += 24) {
    const left = getWaveLeftEdge(y);
    const right = getWaveRightEdge(y);
    ctx.beginPath();
    ctx.moveTo(left + 10, y);
    for (let sx = left + 10; sx < right - 10; sx += 12) {
      const wobble = Math.sin((sx + frameCount * 0.4) * 0.06) * 2;
      ctx.lineTo(sx + 6, y + wobble);
    }
    ctx.stroke();
  }
}

function drawWakeLines() {
  ctx.strokeStyle = 'rgba(100,180,220,0.1)';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  const scroll = (frameCount * 0.5) % 30;
  for (let y = BOAT_BOTTOM + scroll; y < OFF_WAVE_BACK; y += 30) {
    const maxX = getWaveLeftEdge(y) - 10;
    if (maxX < 15) continue;
    ctx.beginPath();
    ctx.moveTo(10, y);
    for (let sx = 10; sx < maxX; sx += 10) {
      ctx.quadraticCurveTo(sx + 5, y + Math.sin(sx * 0.05 + frameCount * 0.03) * 3, sx + 10, y);
    }
    ctx.stroke();
  }
}

function drawSweetSpot() {
  const pulse = 0.12 + Math.sin(frameCount * 0.04) * 0.06;
  for (let y = SAFE_TOP + 20; y < SAFE_BOTTOM - 20; y += 12) {
    const center = getSweetSpotCenter(y);
    const radius = getSweetSpotRadius(y);
    const glow = ctx.createRadialGradient(center, y, 0, center, y, radius);
    glow.addColorStop(0, `rgba(0,229,255,${pulse * 1.5})`);
    glow.addColorStop(0.5, `rgba(0,229,255,${pulse * 0.8})`);
    glow.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.ellipse(center, y, radius, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawWaveWall() {
  // Wave wall fills from getWaveRightEdge(y) to canvas right edge
  const startY = BOAT_BOTTOM;
  const endY = OFF_WAVE_BACK + 30;

  ctx.beginPath();
  ctx.moveTo(W, startY);
  for (let y = startY; y <= endY; y += 2) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    ctx.lineTo(re, y);
  }
  ctx.lineTo(W, endY);
  ctx.closePath();

  // Horizontal gradient: bright aqua at lip → deep dark blue interior
  const wallGrad = ctx.createLinearGradient(100, 0, W, 0);
  wallGrad.addColorStop(0, '#40e8f0');
  wallGrad.addColorStop(0.15, '#20b0d0');
  wallGrad.addColorStop(0.4, '#105878');
  wallGrad.addColorStop(0.7, '#0a3050');
  wallGrad.addColorStop(1, '#061828');
  ctx.fillStyle = wallGrad;
  ctx.fill();

  // Vertical water streaks (subtle stroked curves)
  ctx.strokeStyle = 'rgba(100,200,230,0.06)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  for (let y = startY + 10; y < endY - 20; y += 18) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const streakX = re + 15 + Math.sin(y * 0.05) * 10;
    if (streakX >= W) continue;
    ctx.beginPath();
    ctx.moveTo(streakX, y);
    ctx.quadraticCurveTo(streakX + Math.sin(y * 0.08 + frameCount * 0.02) * 8, y + 25, streakX + 3, y + 50);
    ctx.stroke();
  }

  // Deeper streaks
  ctx.strokeStyle = 'rgba(60,140,170,0.04)';
  ctx.lineWidth = 3;
  for (let y = startY + 30; y < endY - 40; y += 25) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const streakX = re + 50 + Math.sin(y * 0.07) * 15;
    if (streakX >= W) continue;
    ctx.beginPath();
    ctx.moveTo(streakX, y);
    ctx.bezierCurveTo(streakX + 5, y + 20, streakX - 5, y + 40, streakX + 2, y + 60);
    ctx.stroke();
  }

  // Caustic light ellipses near the lip
  const caustT = frameCount * 0.08;
  for (let y = startY + 20; y < endY - 30; y += 22) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const cx = re + 8 + Math.sin(y * 0.12 + caustT) * 12;
    const cy = y + Math.cos(y * 0.08 + caustT * 1.3) * 6;
    if (cx >= W - 5) continue;
    ctx.fillStyle = `rgba(150,240,255,${0.05 + Math.sin(caustT + y * 0.1) * 0.03})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 8 + Math.sin(caustT + y) * 3, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLipFoam() {
  const ft = frameCount * 0.12;
  ctx.lineCap = 'round';
  for (let y = BOAT_BOTTOM + 15; y < SAFE_BOTTOM + 40; y += 4) {
    const right = getWaveRightEdge(y);

    // Smooth foam arc at lip junction
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2 + Math.sin(y * 0.1 + ft) * 1;
    ctx.beginPath();
    ctx.arc(right + 2, y, 6 + Math.sin(y * 0.08 + ft) * 3, Math.PI * 0.3, Math.PI * 1.2);
    ctx.stroke();

    // Foam bubbles as small circles
    if (y % 6 === 0) {
      const bx = right - 5 + Math.sin(y * 0.25 + ft) * 8;
      const by2 = y + Math.cos(y * 0.15 + ft) * 3;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(bx, by2, 2 + Math.sin(y * 0.3 + ft) * 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // Cyan mist bubbles
    if (y % 8 === 0) {
      ctx.fillStyle = 'rgba(170,238,255,0.35)';
      ctx.beginPath();
      ctx.arc(right - 12 + Math.sin(y * 0.15 + ft) * 5, y + 1, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawBoat() {
  const bob = Math.sin(frameCount * 0.03) * 2;
  boatBob = bob;
  const by = 18 + bob;

  // Wake V-lines (stroked curves)
  ctx.strokeStyle = 'rgba(170,238,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const wt = frameCount * 0.08 + i;
    ctx.beginPath();
    ctx.moveTo(170, by + 40);
    ctx.quadraticCurveTo(170 - i * 12, by + 46 + i * 5, 170 - i * 18, by + 52 + i * 8 + Math.sin(wt) * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(230, by + 40);
    ctx.quadraticCurveTo(230 + i * 12, by + 46 + i * 5, 230 + i * 18, by + 52 + i * 8 + Math.cos(wt) * 2);
    ctx.stroke();
  }

  // Hull shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(200, by + 30, 60, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hull — smooth curved path
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(145, by + 28);
  ctx.quadraticCurveTo(145, by + 10, 175, by + 6);
  ctx.lineTo(225, by + 6);
  ctx.quadraticCurveTo(255, by + 10, 255, by + 28);
  ctx.lineTo(250, by + 32);
  ctx.quadraticCurveTo(200, by + 36, 150, by + 32);
  ctx.closePath();
  ctx.fill();

  // Hull highlight
  ctx.strokeStyle = '#4a4a5a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(150, by + 18);
  ctx.quadraticCurveTo(200, by + 14, 250, by + 18);
  ctx.stroke();

  // Transom
  ctx.fillStyle = '#353548';
  ctx.beginPath();
  ctx.moveTo(155, by + 30);
  ctx.quadraticCurveTo(200, by + 36, 245, by + 30);
  ctx.lineTo(245, by + 34);
  ctx.quadraticCurveTo(200, by + 40, 155, by + 34);
  ctx.closePath();
  ctx.fill();

  // Swim platform
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.moveTo(165, by + 36);
  ctx.quadraticCurveTo(200, by + 42, 235, by + 36);
  ctx.lineTo(235, by + 40);
  ctx.quadraticCurveTo(200, by + 46, 165, by + 40);
  ctx.closePath();
  ctx.fill();

  // Wake tower (stroked)
  ctx.strokeStyle = '#777788';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(175, by + 12);
  ctx.lineTo(178, by - 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(225, by + 12);
  ctx.lineTo(222, by - 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(178, by - 6);
  ctx.quadraticCurveTo(200, by - 10, 222, by - 6);
  ctx.stroke();
}

function drawDangerWarning() {
  if (dangerFrontTimer > 20) {
    const alpha = 0.15 + Math.sin(frameCount * 0.3) * 0.1;
    const dGrad = ctx.createLinearGradient(0, BOAT_BOTTOM, 0, DANGER_FRONT);
    dGrad.addColorStop(0, `rgba(255,50,50,${alpha * 1.5})`);
    dGrad.addColorStop(1, 'rgba(255,50,50,0)');
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, BOAT_BOTTOM, W, DANGER_FRONT - BOAT_BOTTOM);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TOO CLOSE TO BOAT!', W / 2, DANGER_FRONT - 15);
    ctx.textAlign = 'left';
  }
  if (dangerBackTimer > 20) {
    const alpha = 0.15 + Math.sin(frameCount * 0.3) * 0.1;
    const dGrad = ctx.createLinearGradient(0, SAFE_BOTTOM, 0, DANGER_BACK);
    dGrad.addColorStop(0, 'rgba(255,50,50,0)');
    dGrad.addColorStop(1, `rgba(255,50,50,${alpha * 1.5})`);
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, SAFE_BOTTOM, W, DANGER_BACK - SAFE_BOTTOM);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('FALLING BEHIND!', W / 2, SAFE_BOTTOM + 30);
    ctx.textAlign = 'left';
  }
}

function drawRider() {
  const x = rider.x;
  const y = rider.y - (rider.airborne ? rider.airHeight * 12 : 0);
  const lean = rider.vx * 0.035;

  // Shadow when airborne
  if (rider.airborne) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(rider.x, rider.y + 10, 28, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(gameState === STATE.FALLING ? fallRotation : lean);

  const armSwing = rider.airborne ? -10
    : (pumpActive ? Math.sin(frameCount * 0.15) * 8 : Math.sin(frameCount * 0.06) * 1.5);

  // ═══ SURFBOARD (ellipse with perspective) ═══
  ctx.save();
  ctx.rotate(-0.15);

  // Board shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, 35, 30, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Board body
  ctx.fillStyle = '#F0F0F0';
  ctx.beginPath();
  ctx.ellipse(0, 33, 28, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Center stripe
  ctx.fillStyle = '#FF4488';
  ctx.beginPath();
  ctx.ellipse(0, 33, 14, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#DD2266';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.ellipse(0, 33, 14, 3, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Board rail
  ctx.strokeStyle = '#D0D0D0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, 33, 28, 6, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Fins
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.ellipse(-10, 38, 3, 2, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, 38, 3, 2, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 39, 2.5, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore(); // undo board rotation

  // ═══ LEGS (sideways stance — natural bezier curves) ═══
  // Viewed from behind, surfer perpendicular to travel (regular stance)

  // Back leg (right, closer to viewer)
  ctx.strokeStyle = '#E8B87C';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(4, 10);
  ctx.quadraticCurveTo(6, 18, 5, 24);
  ctx.quadraticCurveTo(5, 28, 6, 32);
  ctx.stroke();
  // Calf shading
  ctx.strokeStyle = '#C49A64';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(5, 26);
  ctx.lineTo(6, 31);
  ctx.stroke();

  // Front leg (left, further away — slightly darker)
  ctx.strokeStyle = '#D4A670';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-3, 10);
  ctx.quadraticCurveTo(-5, 18, -5, 24);
  ctx.quadraticCurveTo(-4, 28, -5, 32);
  ctx.stroke();

  // ═══ BOARD SHORTS ═══
  ctx.fillStyle = '#DD4422';
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.quadraticCurveTo(-10, 5, -8, 12);
  ctx.lineTo(10, 12);
  ctx.quadraticCurveTo(12, 5, 10, 0);
  ctx.closePath();
  ctx.fill();
  // Waistband
  ctx.fillStyle = '#993316';
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.quadraticCurveTo(0, -1, 10, 0);
  ctx.quadraticCurveTo(0, 1.5, -8, 1.5);
  ctx.closePath();
  ctx.fill();
  // Side stripe
  ctx.strokeStyle = '#EE6644';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(9, 2);
  ctx.lineTo(9, 11);
  ctx.stroke();

  // ═══ TORSO (RASH GUARD — smooth paths) ═══
  ctx.fillStyle = '#2266AA';
  ctx.beginPath();
  ctx.moveTo(-9, -18);
  ctx.quadraticCurveTo(-12, -10, -10, 0);
  ctx.lineTo(10, 0);
  ctx.quadraticCurveTo(12, -10, 9, -18);
  ctx.closePath();
  ctx.fill();

  // Lighter center panel
  ctx.fillStyle = '#3388CC';
  ctx.beginPath();
  ctx.moveTo(-4, -16);
  ctx.quadraticCurveTo(-5, -8, -4, 0);
  ctx.lineTo(4, 0);
  ctx.quadraticCurveTo(5, -8, 4, -16);
  ctx.closePath();
  ctx.fill();

  // Darker side panels
  ctx.fillStyle = '#1A4E80';
  ctx.beginPath();
  ctx.moveTo(-9, -16);
  ctx.quadraticCurveTo(-11, -10, -10, -2);
  ctx.lineTo(-8, -2);
  ctx.quadraticCurveTo(-9, -10, -7, -16);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(9, -16);
  ctx.quadraticCurveTo(11, -10, 10, -2);
  ctx.lineTo(8, -2);
  ctx.quadraticCurveTo(9, -10, 7, -16);
  ctx.closePath();
  ctx.fill();

  // ═══ ARMS (thick stroked curves + circle hands) ═══
  // Lead arm (right) extends toward wave
  ctx.strokeStyle = '#E8B87C';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(9, -14);
  ctx.quadraticCurveTo(18, -12 - armSwing * 0.5, 22, -6 - armSwing);
  ctx.stroke();
  ctx.fillStyle = '#E8B87C';
  ctx.beginPath();
  ctx.arc(22, -6 - armSwing, 3, 0, Math.PI * 2);
  ctx.fill();

  // Back arm (left) for balance
  ctx.strokeStyle = '#D4A670';
  ctx.lineWidth = 4.5;
  ctx.beginPath();
  ctx.moveTo(-9, -14);
  ctx.quadraticCurveTo(-17, -12 + armSwing * 0.5, -20, -8 + armSwing);
  ctx.stroke();
  ctx.fillStyle = '#D4A670';
  ctx.beginPath();
  ctx.arc(-20, -8 + armSwing, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // ═══ NECK ═══
  ctx.fillStyle = '#E8B87C';
  ctx.beginPath();
  ctx.ellipse(0, -20, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // ═══ HEAD (turned forward, one ear visible) ═══
  ctx.fillStyle = '#E8B87C';
  ctx.beginPath();
  ctx.ellipse(0, -29, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ear (right side visible since head turned forward)
  ctx.fillStyle = '#D4A670';
  ctx.beginPath();
  ctx.ellipse(8, -28, 2.5, 3, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#C49A64';
  ctx.beginPath();
  ctx.ellipse(8, -28, 1.5, 2, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // ═══ HAIR (overlapping ellipses with highlights) ═══
  ctx.fillStyle = '#8B5E3C';
  ctx.beginPath();
  ctx.ellipse(0, -34, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-3, -32, 8, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(3, -33, 7, 5, 0.15, 0, Math.PI * 2);
  ctx.fill();
  // Top tuft
  ctx.beginPath();
  ctx.ellipse(1, -38, 5, 4, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Highlights
  ctx.fillStyle = '#B87D4A';
  ctx.beginPath();
  ctx.ellipse(2, -37, 3, 2.5, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-4, -34, 2.5, 2, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Dark edges
  ctx.fillStyle = '#5C3A1E';
  ctx.beginPath();
  ctx.ellipse(-6, -32, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, -32, 2.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Board wake
  if (!rider.airborne && gameState !== STATE.GAME_OVER) drawBoardWake(x, y);
}

function drawBoardWake(x, y) {
  const speed = Math.sqrt(rider.vx * rider.vx + rider.vy * rider.vy);
  if (speed < 0.5) return;
  const intensity = Math.min(1, speed / 5);

  // Curved spray arcs
  ctx.strokeStyle = `rgba(200,240,255,${0.3 * intensity})`;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - 10, y + 36);
  ctx.quadraticCurveTo(x - 18 - speed * 2, y + 30, x - 22 - speed * 3, y + 26);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 10, y + 36);
  ctx.quadraticCurveTo(x + 18 + speed * 2, y + 30, x + 22 + speed * 3, y + 26);
  ctx.stroke();

  // Smooth droplets
  for (let i = 0; i < 6 * intensity; i++) {
    ctx.fillStyle = `rgba(200,240,255,${0.3 * intensity})`;
    ctx.beginPath();
    ctx.arc(x + (Math.random() - 0.5) * 30, y + 38 + Math.random() * 10,
      1 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rooster tail on hard carves
  if (speed > 3) {
    const dir = -Math.sign(rider.vx);
    const ri = Math.min(1, (speed - 3) / 4);

    // Main spray curve
    ctx.strokeStyle = `rgba(255,255,255,${0.4 * ri})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + 34);
    ctx.bezierCurveTo(x + dir * 15, y + 20, x + dir * 25, y + 15 - speed, x + dir * 35, y + 10 - speed * 1.5);
    ctx.stroke();

    // Spray droplets
    for (let i = 0; i < 8 * ri; i++) {
      ctx.fillStyle = `rgba(255,255,255,${0.4 * ri * Math.random()})`;
      ctx.beginPath();
      ctx.arc(x + dir * (14 + Math.random() * 24),
        y + 24 + Math.random() * 14 - speed, 1 + Math.random() * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Game Flow ──
function startGame() {
  gameState = STATE.PLAYING;
  gameRunning = true;
  score = 0;
  frameCount = 0;
  combo = 1;
  comboTimer = 0;
  bestCombo = 1;
  floatingTexts = [];
  particles = [];
  rider.x = W * 0.4;
  rider.y = H * 0.5;
  rider.vx = 0;
  rider.vy = 0;
  rider.airborne = false;
  rider.airTime = 0;
  rider.airHeight = 0;
  waveNarrowFactor = 1.0;
  sweetSpotSize = 1.0;
  turbulenceLevel = 0;
  wavePushForce = 0.04;
  difficultyLevel = 1;
  difficultyTimer = 0;
  rogueWaveTimer = 0;
  rogueWaveActive = false;
  dangerFrontTimer = 0;
  dangerBackTimer = 0;
  offWaveTimer = 0;
  betaHistory = [];
  pumpActive = false;
  pumpBoost = 0;
  fallTimer = 0;
  rideStartTime = performance.now();
  document.getElementById('game-over-overlay').style.display = 'none';
}

function showGameOver() {
  const rideTime = ((performance.now() - rideStartTime) / 1000).toFixed(1);
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('ride-time').textContent = 'Ride time: ' + rideTime + 's';
  document.getElementById('best-combo').textContent = 'Best combo: x' + bestCombo;
  document.getElementById('game-over-overlay').style.display = 'flex';
  if (conn && conn.open) {
    conn.send(JSON.stringify({ type: 'gameover', score }));
  }
}

function restartGame() {
  startGame();
}

// ── Main Loop ──
function gameLoop() {
  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background layers (back-to-front)
  drawSky();
  drawDeepWater();
  drawWaveFace();
  drawWakeLines();
  drawSweetSpot();
  drawWaveWall();
  drawLipFoam();
  drawBoat();

  if (gameState === STATE.PLAYING) {
    frameCount++;
    processGyro();
    detectPump();
    updatePhysics(1);
    updateDifficulty();
    updateCombo();
    spawnCarveSpray();

    // Riding score
    if (isInSweetSpot(rider.x, rider.y)) {
      score += 1;
    } else if (isOnWave(rider.x, rider.y)) {
      score += 0.5;
    }

    // Pump score
    if (pumpActive) score += 2;

    drawDangerWarning();
  } else if (gameState === STATE.FALLING) {
    frameCount++;
    updateFall();
  }

  // Draw rider
  drawRider();

  // Particles & floating text
  updateParticles();
  updateFloatingTexts();

  // Score display
  document.getElementById('score-display').textContent = 'SCORE: ' + Math.floor(score);

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
