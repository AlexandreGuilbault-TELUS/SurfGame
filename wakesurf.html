<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakesurf Game</title>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a1628;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
canvas { display: block; }
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 10;
}
#qr-container {
  background: rgba(0,0,0,0.85);
  border: 3px solid #00e5ff;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  pointer-events: auto;
}
#qr-container h2 {
  color: #00e5ff;
  font-size: 18px;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
#qr-container p {
  color: #88ccdd;
  font-size: 13px;
  margin-top: 12px;
}
#qr-box { margin: 0 auto; }
#status {
  color: #ffcc00;
  font-size: 14px;
  margin-top: 8px;
}
#score-display {
  position: absolute;
  top: 16px;
  right: 24px;
  color: #fff;
  font-size: 24px;
  text-shadow: 2px 2px 0 #000;
  z-index: 5;
}
#combo-display {
  position: absolute;
  top: 46px;
  right: 24px;
  color: #ffcc00;
  font-size: 16px;
  text-shadow: 2px 2px 0 #000;
  z-index: 5;
  display: none;
}
#game-over-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
}
#game-over-overlay h1 {
  color: #ff4444;
  font-size: 48px;
  text-shadow: 3px 3px 0 #000;
  margin-bottom: 12px;
}
#game-over-overlay p {
  color: #fff;
  font-size: 24px;
}
#game-over-overlay .sub {
  color: #88ccdd;
  font-size: 16px;
  margin-top: 8px;
}
#keyboard-hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: #556;
  font-size: 12px;
  z-index: 5;
}
#version {
  position: fixed;
  bottom: 4px;
  right: 8px;
  color: #556;
  font-size: 10px;
  z-index: 50;
  pointer-events: none;
}
#back-btn {
  position: fixed;
  top: 8px;
  left: 8px;
  color: #556;
  font-size: 12px;
  z-index: 50;
  cursor: pointer;
  background: none;
  border: 1px solid #334;
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'Courier New', monospace;
}
#back-btn:hover { color: #00e5ff; border-color: #00e5ff; }
#mode-selector {
  display: none;
  flex-direction: row;
  gap: 12px;
  margin-top: 16px;
  justify-content: center;
}
#mode-selector button {
  background: rgba(0,0,0,0.85);
  color: #00e5ff;
  border: 2px solid #00e5ff;
  border-radius: 8px;
  padding: 10px 28px;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background 0.2s;
}
#mode-selector button:hover {
  background: rgba(0,229,255,0.15);
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="score-display">SCORE: 0</div>
<div id="combo-display"></div>
<div id="keyboard-hint">Arrow keys to steer &bull; Space to restart</div>
<div id="version">v3.3</div>
<button id="back-btn" onclick="window.location.href='index.html'">&larr; MENU</button>

<div id="overlay">
  <div id="qr-container">
    <h2>Scan to Connect Controller</h2>
    <div id="qr-box"></div>
    <p id="status">Initializing...</p>
    <div id="mode-selector">
      <button id="btn-play" onclick="selectMode()">PLAY</button>
    </div>
  </div>
</div>

<div id="game-over-overlay">
  <h1>WIPEOUT!</h1>
  <p id="final-score">Score: 0</p>
  <p class="sub" id="ride-time">Ride time: 0s</p>
  <p class="sub" id="best-combo">Best combo: x1</p>
  <p class="sub" id="restart-hint">Press SPACE or tap phone to restart</p>
</div>

<script>
// ── Canvas Setup ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W;
canvas.height = H;

function fitCanvas() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ── Game Constants ──
const BOAT_BOTTOM = 80;
const DANGER_FRONT = 140;
const SAFE_TOP = 160;
const SAFE_BOTTOM = 530;
const DANGER_BACK = 580;
const OFF_WAVE_BACK = 620;

// ── Game State ──
const STATE = { WAITING: 0, PLAYING: 1, FALLING: 2, GAME_OVER: 3 };
let gameState = STATE.WAITING;

let rider = { x: W * 0.4, y: H * 0.5, w: 60, h: 90, vx: 0, vy: 0,
              airborne: false, airTime: 0, airHeight: 0, launchSpeed: 0 };
let score = 0;
let frameCount = 0;
let rideStartTime = 0;
let combo = 1;
let comboTimer = 0;
let bestCombo = 1;
let floatingTexts = [];
let particles = [];
let foamParticles = [];

// Wave / difficulty
let waveNarrowFactor = 1.0;
let sweetSpotSize = 1.0;
let turbulenceLevel = 0;
let wavePushForce = 0.04;
let difficultyLevel = 1;
let difficultyTimer = 0;
let rogueWaveTimer = 0;
let rogueWaveActive = false;

// Gyro input
let gyroGamma = 0;    // left-right
let gyroBeta = 0;     // fore-aft
let prevSensorGamma = 0, lastSensorGamma = 0;
let prevSensorBeta = 0, lastSensorBeta = 0;
let sensorTimestamp = 0;
let sensorInterval = 33; // ~30Hz from controller

// Pump detection
let betaHistory = [];
let pumpActive = false;
let pumpBoost = 0;

// Fall
let fallType = '';
let fallTimer = 0;
let fallRotation = 0;
let fallVx = 0, fallVy = 0;
let dangerFrontTimer = 0;
let dangerBackTimer = 0;
let offWaveTimer = 0;

// Carve detection
let lastCarveDir = 0;
let carveSpeed = 0;
let carveDuration = 0;

// Boat bob
let boatBob = 0;

// Connection
let controllerConnected = false;
let conn = null;
let gameRunning = false;

// ── Keyboard ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' && gameState === STATE.GAME_OVER) restartGame();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ── PeerJS ──
const peer = new Peer(null, {
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  }
});

peer.on('open', id => {
  document.getElementById('status').textContent = 'Waiting for controller...';
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  const url = base + 'controller.html?id=' + id;
  document.getElementById('qr-box').innerHTML = '';
  new QRCode(document.getElementById('qr-box'), {
    text: url, width: 200, height: 200,
    colorDark: '#00e5ff', colorLight: '#0a1628'
  });
});

peer.on('error', err => {
  document.getElementById('status').textContent = 'Connection error: ' + err.type;
});

peer.on('connection', c => {
  if (conn) { c.close(); return; }
  conn = c;
  controllerConnected = true;
  document.getElementById('status').textContent = 'Controller connected!';

  c.on('open', () => {
    c.send(JSON.stringify({ type: 'connected' }));
    setTimeout(() => {
      document.getElementById('keyboard-hint').style.display = 'none';
      document.getElementById('mode-selector').style.display = 'flex';
    }, 800);
  });

  c.on('data', raw => {
    const msg = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (msg.type === 'gyro') {
      prevSensorGamma = lastSensorGamma;
      prevSensorBeta = lastSensorBeta;
      lastSensorGamma = msg.gamma;
      lastSensorBeta = msg.beta;
      sensorTimestamp = performance.now();
    } else if (msg.type === 'restart') {
      if (gameState === STATE.GAME_OVER) restartGame();
    }
  });

  c.on('close', () => {
    conn = null;
    controllerConnected = false;
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('status').textContent = 'Controller disconnected. Scan again.';
  });
});

// Show keyboard hint after delay
setTimeout(() => {
  if (!controllerConnected) {
    document.getElementById('overlay').style.opacity = '0.6';
  }
}, 3000);

window.addEventListener('keydown', e => {
  if (!controllerConnected && gameState === STATE.WAITING &&
      (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
    document.getElementById('mode-selector').style.display = 'flex';
  }
});

// ── Mode Selection ──
function selectMode() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('keyboard-hint').style.display = 'none';
  startGame();
}

// ── Wave Geometry ──
function getWaveLeftEdge(y) {
  const progress = Math.max(0, (y - BOAT_BOTTOM) / (SAFE_BOTTOM - BOAT_BOTTOM));
  const narrow = rogueWaveActive ? waveNarrowFactor * 0.6 : waveNarrowFactor;
  return 50 + (1 - progress) * 40 * narrow;
}

function getWaveRightEdge(y) {
  const progress = Math.max(0, (y - BOAT_BOTTOM) / (SAFE_BOTTOM - BOAT_BOTTOM));
  const narrow = rogueWaveActive ? waveNarrowFactor * 0.6 : waveNarrowFactor;
  return 140 + progress * 220 * narrow;
}

function getSweetSpotCenter(y) {
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return left + (right - left) * 0.55;
}

function getSweetSpotRadius(y) {
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return (right - left) * 0.2 * sweetSpotSize;
}

function isInSweetSpot(x, y) {
  const center = getSweetSpotCenter(y);
  const radius = getSweetSpotRadius(y);
  return Math.abs(x - center) < radius && y > SAFE_TOP && y < SAFE_BOTTOM;
}

function isOnWave(x, y) {
  if (y < DANGER_FRONT || y > DANGER_BACK) return false;
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  return x > left && x < right;
}

function isInDangerZone(x, y) {
  if (y < DANGER_FRONT && y > BOAT_BOTTOM) return 'front';
  if (y > SAFE_BOTTOM && y < OFF_WAVE_BACK) return 'back';
  const left = getWaveLeftEdge(y);
  const right = getWaveRightEdge(y);
  if (x < left + 15 || x > right - 15) return 'edge';
  return false;
}

// ── Gyro Processing (improved) ──
function processGyro(dt) {
  let gamma, beta;

  if (controllerConnected) {
    // Interpolate between sensor readings for smooth 60fps
    const elapsed = performance.now() - sensorTimestamp;
    const t = Math.min(1.5, elapsed / sensorInterval);
    gamma = lastSensorGamma + (lastSensorGamma - prevSensorGamma) * (t - 1) * 0.6;
    beta = lastSensorBeta + (lastSensorBeta - prevSensorBeta) * (t - 1) * 0.6;

    // Bias compensation
    gamma += 1.3;
    beta -= 1.3;
  } else {
    // Keyboard fallback
    gamma = 0; beta = 0;
    if (keys['ArrowLeft']) gamma = -6;
    if (keys['ArrowRight']) gamma = 6;
    if (keys['ArrowUp']) beta = -4;
    if (keys['ArrowDown']) beta = 4;
  }

  // Dead zone ±1°
  if (Math.abs(gamma) < 1) gamma = 0;
  else gamma = gamma - Math.sign(gamma) * 1;

  if (Math.abs(beta) < 1) beta = 0;
  else beta = beta - Math.sign(beta) * 1;

  // Clamp to ±8° range
  gamma = Math.max(-8, Math.min(8, gamma));
  beta = Math.max(-8, Math.min(8, beta));

  // Normalize to -1..1
  gyroGamma = gamma / 7; // after dead zone subtraction, max is 7
  gyroBeta = beta / 7;

  // Fall detection: rapid beta plunge
  if (controllerConnected) {
    const betaRate = Math.abs(lastSensorBeta - prevSensorBeta);
    if (betaRate > 10) {
      triggerFall('flail');
      return;
    }
    // Extreme tilt
    if (Math.abs(lastSensorGamma) > 25 || Math.abs(lastSensorBeta) > 25) {
      triggerFall('flail');
      return;
    }
  }
}

// ── Pump Detection ──
function detectPump() {
  betaHistory.push({ val: gyroBeta, t: performance.now() });
  // Keep 2 second window
  const cutoff = performance.now() - 2000;
  while (betaHistory.length > 0 && betaHistory[0].t < cutoff) betaHistory.shift();

  if (betaHistory.length < 6) { pumpActive = false; return; }

  // Count zero crossings
  let crossings = 0;
  for (let i = 1; i < betaHistory.length; i++) {
    if ((betaHistory[i].val > 0) !== (betaHistory[i-1].val > 0)) crossings++;
  }

  // 3-6 crossings in 2s = valid pump (0.75-1.5 Hz)
  if (crossings >= 3 && crossings <= 6) {
    // Check amplitude
    let maxVal = 0;
    for (const b of betaHistory) maxVal = Math.max(maxVal, Math.abs(b.val));
    if (maxVal > 0.25) { // ~2° after normalization
      pumpActive = true;
      pumpBoost = Math.min(pumpBoost + 0.02, 1.5);
      return;
    }
  }
  pumpActive = false;
  pumpBoost = Math.max(0, pumpBoost - 0.01);
}

// ── Physics ──
function updatePhysics(dt) {
  if (rider.airborne) {
    // Parabolic arc
    rider.airTime += dt;
    rider.airHeight -= 3 * dt; // gravity
    rider.vy = 0;
    rider.x += rider.vx * 0.5;
    // Land when airHeight <= 0
    if (rider.airHeight <= 0) {
      rider.airborne = false;
      rider.airHeight = 0;
      // Landing score
      const airScore = Math.round(rider.launchSpeed * 10 + rider.airTime * 30);
      addScore(airScore, 'AIR!');
      addScore(50, 'CLEAN LAND');
      spawnSplash(rider.x, rider.y, 8);
      rider.airTime = 0;
    }
    return;
  }

  // Lateral force from gamma
  const lateralForce = gyroGamma * 0.4;
  rider.vx += lateralForce;

  // Vertical force from beta + wave push
  const verticalForce = gyroBeta * 0.35;
  rider.vy += verticalForce;
  rider.vy -= wavePushForce; // wave pushes rider toward boat (negative y)

  // Pump boost — extra forward resistance (counteract wave push)
  if (pumpActive) {
    rider.vy += 0.06;
  }

  // Speed bonus dropping from lip to trough (right to left, high x to low x)
  const waveCenter = getSweetSpotCenter(rider.y);
  const waveRight = getWaveRightEdge(rider.y);
  if (rider.vx < -1 && rider.x > waveCenter) {
    // Carving left from high on face — speed bonus
    carveSpeed = Math.abs(rider.vx);
    carveDuration++;
    const carveDir = -1;
    if (lastCarveDir !== carveDir && lastCarveDir !== 0 && carveDuration > 10) {
      // Direction change = completed carve
      const carveScore = Math.round(carveSpeed * carveDuration * 0.1);
      if (carveScore > 5) addScore(carveScore, 'CARVE');
      carveDuration = 0;
    }
    lastCarveDir = carveDir;
  } else if (rider.vx > 1 && rider.x < waveCenter) {
    carveSpeed = Math.abs(rider.vx);
    carveDuration++;
    const carveDir = 1;
    if (lastCarveDir !== carveDir && lastCarveDir !== 0 && carveDuration > 10) {
      const carveScore = Math.round(carveSpeed * carveDuration * 0.1);
      if (carveScore > 5) addScore(carveScore, 'CARVE');
      carveDuration = 0;
    }
    lastCarveDir = carveDir;
  } else {
    carveDuration = 0;
  }

  // Turbulence
  if (turbulenceLevel > 0) {
    rider.vx += (Math.random() - 0.5) * turbulenceLevel * 0.15;
    rider.vy += (Math.random() - 0.5) * turbulenceLevel * 0.1;
  }

  // Drag
  rider.vx *= 0.96;
  rider.vy *= 0.94;

  // Clamp velocity
  rider.vx = Math.max(-8, Math.min(8, rider.vx));
  rider.vy = Math.max(-6, Math.min(6, rider.vy));

  // Edge springs — wave boundaries
  const leftEdge = getWaveLeftEdge(rider.y);
  const rightEdge = getWaveRightEdge(rider.y);

  if (rider.x < leftEdge + 20) {
    rider.vx += (leftEdge + 20 - rider.x) * 0.12;
  }
  if (rider.x > rightEdge - 20) {
    rider.vx -= (rider.x - (rightEdge - 20)) * 0.12;
  }
  // Vertical edges
  if (rider.y < SAFE_TOP) {
    rider.vy += (SAFE_TOP - rider.y) * 0.08;
  }
  if (rider.y > SAFE_BOTTOM) {
    rider.vy -= (rider.y - SAFE_BOTTOM) * 0.08;
  }

  // Apply velocity
  rider.x += rider.vx;
  rider.y += rider.vy;

  // Air launch — near lip with enough rightward speed
  if (rider.x > rightEdge - 30 && rider.vx > 3 && !rider.airborne) {
    rider.airborne = true;
    rider.airTime = 0;
    rider.airHeight = 3 + Math.abs(rider.vx) * 0.8;
    rider.launchSpeed = Math.abs(rider.vx);
    comboHit();
  }

  // Check danger zones
  const danger = isInDangerZone(rider.x, rider.y);
  if (danger === 'front') {
    dangerFrontTimer++;
    if (dangerFrontTimer > 90) triggerFall('boat_crash'); // 1.5s at 60fps
  } else {
    dangerFrontTimer = Math.max(0, dangerFrontTimer - 2);
  }

  if (danger === 'back') {
    dangerBackTimer++;
    if (dangerBackTimer > 90) triggerFall('off_wave');
  } else {
    dangerBackTimer = Math.max(0, dangerBackTimer - 2);
  }

  // Off wave bounds
  if (!isOnWave(rider.x, rider.y) && rider.y > DANGER_FRONT && rider.y < OFF_WAVE_BACK) {
    offWaveTimer++;
    if (offWaveTimer > 30) triggerFall('over_lip'); // 0.5s
  } else {
    offWaveTimer = Math.max(0, offWaveTimer - 2);
  }

  // Hard off-screen
  if (rider.y < BOAT_BOTTOM) triggerFall('boat_crash');
  if (rider.y > OFF_WAVE_BACK) triggerFall('off_wave');
  if (rider.x < 10 || rider.x > W - 10) triggerFall('over_lip');
}

// ── Fall ──
function triggerFall(type) {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.FALLING;
  fallType = type;
  fallTimer = 60; // 1 second
  fallRotation = 0;
  fallVx = rider.vx;
  fallVy = rider.vy;
  if (type === 'boat_crash') { fallVy = -4; fallVx = (Math.random()-0.5)*3; }
  if (type === 'over_lip') { fallVx = 3; fallVy = 2; }
  if (type === 'off_wave') { fallVy = 3; fallVx = (Math.random()-0.5)*2; }
  spawnSplash(rider.x, rider.y, 15);
}

function updateFall() {
  fallTimer--;
  fallRotation += 0.15;
  rider.x += fallVx * 0.5;
  rider.y += fallVy * 0.5;
  fallVy += 0.1;
  // Spawn splash particles during fall
  if (fallTimer % 5 === 0) spawnSplash(rider.x, rider.y, 3);
  if (fallTimer <= 0) {
    spawnSplash(rider.x, rider.y, 20); // big final splash
    gameState = STATE.GAME_OVER;
    showGameOver();
  }
}

// ── Scoring ──
function addScore(pts, label) {
  score += pts * combo;
  floatingTexts.push({
    text: '+' + (pts * combo) + ' ' + label,
    x: rider.x, y: rider.y - 50 - (rider.airborne ? rider.airHeight * 12 : 0),
    life: 60, color: combo > 1 ? '#ffcc00' : '#ffffff'
  });
}

function comboHit() {
  combo++;
  comboTimer = 120; // 2s to keep combo
  if (combo > bestCombo) bestCombo = combo;
}

function updateCombo() {
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 1;
  }
  const el = document.getElementById('combo-display');
  if (combo > 1) {
    el.style.display = 'block';
    el.textContent = 'x' + combo + ' COMBO';
  } else {
    el.style.display = 'none';
  }
}

// ── Difficulty ──
function updateDifficulty() {
  difficultyTimer++;
  if (difficultyTimer % 1800 === 0) { // every ~30s
    difficultyLevel++;
    waveNarrowFactor = Math.max(0.5, waveNarrowFactor - 0.08);
    sweetSpotSize = Math.max(0.4, sweetSpotSize - 0.1);
    turbulenceLevel = Math.min(3, turbulenceLevel + 0.5);
    wavePushForce = Math.min(0.12, wavePushForce + 0.012);
  }
  // Rogue waves at level 5+
  if (difficultyLevel >= 5) {
    rogueWaveTimer++;
    if (!rogueWaveActive && rogueWaveTimer > 600 && Math.random() < 0.003) {
      rogueWaveActive = true;
      rogueWaveTimer = 0;
    }
    if (rogueWaveActive && rogueWaveTimer > 180) { // 3s rogue wave
      rogueWaveActive = false;
      rogueWaveTimer = 0;
    }
  }
}

// ── Particles ──
function spawnSplash(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 25 + Math.random() * 20,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.4 ? '#ffffff' : '#aaeeff'
    });
  }
}

function spawnCarveSpray() {
  const speed = Math.sqrt(rider.vx*rider.vx + rider.vy*rider.vy);
  if (speed < 1.5 || rider.airborne) return;
  const count = Math.min(5, Math.floor(speed / 1.5));
  for (let i = 0; i < count; i++) {
    particles.push({
      x: rider.x - rider.vx * 3,
      y: rider.y + 36,
      vx: -rider.vx * 0.4 + (Math.random()-0.5)*3,
      vy: (Math.random()-0.5)*2 + 1.5,
      life: 18 + Math.random() * 12,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#ffffff' : '#aaeeff'
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 1;
    ft.life--;
    if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
    ctx.globalAlpha = ft.life / 60;
    ctx.fillStyle = ft.color;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ── Rendering ──

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, 30);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.5, '#5BA8D0');
  grad.addColorStop(1, '#3a7898');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 30);
  // Soft horizon blend into water
  const horizGrad = ctx.createLinearGradient(0, 24, 0, 45);
  horizGrad.addColorStop(0, 'rgba(58,120,152,0.8)');
  horizGrad.addColorStop(1, 'rgba(11,61,91,0)');
  ctx.fillStyle = horizGrad;
  ctx.fillRect(0, 24, W, 21);
}

function drawDeepWater() {
  const baseGrad = ctx.createLinearGradient(0, 30, 0, H);
  baseGrad.addColorStop(0, '#0B3D5B');
  baseGrad.addColorStop(0.4, '#0E5A7E');
  baseGrad.addColorStop(1, '#093048');
  ctx.fillStyle = baseGrad;
  ctx.fillRect(0, 30, W, H - 30);

  // Organic bezier ripple curves on flat water left of trough
  ctx.strokeStyle = 'rgba(100,180,220,0.07)';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  const scroll = frameCount * 0.6;
  for (let y = BOAT_BOTTOM + 20; y < OFF_WAVE_BACK; y += 14) {
    const leftEdge = getWaveLeftEdge(y);
    if (leftEdge < 30) continue;
    const yOff = y + (scroll % 14);
    ctx.beginPath();
    ctx.moveTo(3, yOff);
    for (let sx = 3; sx < leftEdge - 15; sx += 25) {
      const cy1 = yOff + Math.sin(sx * 0.07 + frameCount * 0.02) * 3;
      const cy2 = yOff + Math.cos(sx * 0.09 + frameCount * 0.025) * 2;
      ctx.bezierCurveTo(sx + 8, cy1, sx + 17, cy2, sx + 25, yOff);
    }
    ctx.stroke();
  }

  // Sun dapple — shimmering ellipses
  const dapT = frameCount * 0.04;
  for (let i = 0; i < 8; i++) {
    const dx = 15 + (i * 37 + i * i * 13) % 120;
    const dy = BOAT_BOTTOM + 60 + (i * 53 + i * 19) % 400;
    const leftE = getWaveLeftEdge(dy);
    if (dx > leftE - 20) continue;
    const alpha = 0.04 + Math.sin(dapT + i * 1.7) * 0.025;
    ctx.fillStyle = `rgba(140,210,240,${Math.max(0, alpha)})`;
    ctx.beginPath();
    ctx.ellipse(dx, dy, 12 + Math.sin(dapT + i) * 4, 5 + Math.sin(dapT * 1.3 + i) * 2, 0.3 + i * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawWaveFace() {
  const yStart = BOAT_BOTTOM;
  const yEnd = OFF_WAVE_BACK;

  // Build clip path for the V-shaped wave face
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(getWaveLeftEdge(yStart), yStart);
  for (let y = yStart; y <= yEnd; y += 4) {
    ctx.lineTo(getWaveLeftEdge(y), y);
  }
  for (let y = yEnd; y >= yStart; y -= 4) {
    ctx.lineTo(getWaveRightEdge(y), y);
  }
  ctx.closePath();
  ctx.clip();

  // Single horizontal gradient fill
  const faceGrad = ctx.createLinearGradient(0, 0, W * 0.75, 0);
  faceGrad.addColorStop(0, '#0A4D6E');
  faceGrad.addColorStop(0.3, '#147090');
  faceGrad.addColorStop(0.55, '#2098B8');
  faceGrad.addColorStop(0.75, '#40C8E0');
  faceGrad.addColorStop(1, '#70ECF0');
  ctx.fillStyle = faceGrad;
  ctx.fillRect(0, yStart, W, yEnd - yStart);

  // Depth shading — darker near boat
  const depthGrad = ctx.createLinearGradient(0, yStart, 0, yEnd);
  depthGrad.addColorStop(0, 'rgba(5,30,50,0.35)');
  depthGrad.addColorStop(0.3, 'rgba(5,30,50,0.15)');
  depthGrad.addColorStop(0.6, 'rgba(5,30,50,0.05)');
  depthGrad.addColorStop(1, 'rgba(5,30,50,0.2)');
  ctx.fillStyle = depthGrad;
  ctx.fillRect(0, yStart, W, yEnd - yStart);

  // Flowing contour lines (bezier curves scrolling downward)
  const scroll = (frameCount * 0.8) % 28;
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  for (let y = yStart + scroll; y < yEnd; y += 28) {
    const left = getWaveLeftEdge(y);
    const right = getWaveRightEdge(y);
    ctx.strokeStyle = 'rgba(150,230,250,0.12)';
    ctx.beginPath();
    ctx.moveTo(left + 5, y);
    for (let sx = left + 5; sx < right - 5; sx += 18) {
      const w1 = Math.sin((sx + frameCount * 0.5) * 0.05) * 2.5;
      const w2 = Math.cos((sx + frameCount * 0.3) * 0.07) * 1.5;
      ctx.bezierCurveTo(sx + 6, y + w1, sx + 12, y + w2, sx + 18, y);
    }
    ctx.stroke();
    // Secondary fainter contour
    if (y + 12 < yEnd) {
      ctx.strokeStyle = 'rgba(120,200,230,0.06)';
      ctx.beginPath();
      ctx.moveTo(left + 12, y + 12);
      for (let sx = left + 12; sx < right - 12; sx += 22) {
        const w1 = Math.sin((sx + frameCount * 0.4) * 0.06) * 2;
        ctx.quadraticCurveTo(sx + 11, y + 12 + w1, sx + 22, y + 12);
      }
      ctx.stroke();
    }
  }

  // Caustic light ellipses
  const caustT = frameCount * 0.06;
  for (let i = 0; i < 12; i++) {
    const cy = yStart + 40 + (i * 47) % (yEnd - yStart - 60);
    const left = getWaveLeftEdge(cy);
    const right = getWaveRightEdge(cy);
    const cx = left + (right - left) * (0.3 + (i * 0.17) % 0.5);
    const alpha = 0.06 + Math.sin(caustT + i * 2.1) * 0.04;
    ctx.fillStyle = `rgba(180,250,255,${Math.max(0, alpha)})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy + Math.sin(caustT * 1.2 + i) * 3, 10 + Math.sin(caustT + i) * 4, 4 + Math.sin(caustT * 0.8 + i) * 2, 0.2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawWaveWall() {
  const startY = BOAT_BOTTOM;
  const endY = OFF_WAVE_BACK + 30;

  // Build wall shape with barrel bulge
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(W, startY);
  for (let y = startY; y <= endY; y += 2) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const midFactor = 1 - Math.abs((y - (startY + endY) / 2) / ((endY - startY) / 2));
    const bulge = midFactor * midFactor * 8;
    ctx.lineTo(re - bulge, y);
  }
  ctx.lineTo(W, endY);
  ctx.closePath();

  // Barrel interior — deep dark fill
  const interiorGrad = ctx.createLinearGradient(W * 0.6, 0, W, 0);
  interiorGrad.addColorStop(0, '#0A3A55');
  interiorGrad.addColorStop(0.5, '#062A40');
  interiorGrad.addColorStop(1, '#031218');
  ctx.fillStyle = interiorGrad;
  ctx.fill();

  // Wall surface layer — bright at lip, fading deeper
  ctx.beginPath();
  ctx.moveTo(W * 0.85, startY);
  for (let y = startY; y <= endY; y += 2) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const midFactor = 1 - Math.abs((y - (startY + endY) / 2) / ((endY - startY) / 2));
    const bulge = midFactor * midFactor * 8;
    ctx.lineTo(re - bulge, y);
  }
  ctx.lineTo(W * 0.85, endY);
  ctx.closePath();
  const wallGrad = ctx.createLinearGradient(100, 0, W * 0.85, 0);
  wallGrad.addColorStop(0, '#55E0F0');
  wallGrad.addColorStop(0.2, '#30B0D0');
  wallGrad.addColorStop(0.5, '#155878');
  wallGrad.addColorStop(1, '#052030');
  ctx.fillStyle = wallGrad;
  ctx.fill();

  // Vertical flow lines — water cascading down
  ctx.lineCap = 'round';
  for (let y = startY + 8; y < endY - 25; y += 16) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const streakX = re + 10 + Math.sin(y * 0.06) * 8;
    if (streakX >= W - 3) continue;
    ctx.strokeStyle = `rgba(100,200,230,${0.06 + Math.sin(y * 0.03 + frameCount * 0.02) * 0.02})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(streakX, y);
    ctx.bezierCurveTo(
      streakX + Math.sin(y * 0.08 + frameCount * 0.02) * 6, y + 15,
      streakX - Math.sin(y * 0.06 + frameCount * 0.03) * 4, y + 35,
      streakX + 2, y + 50
    );
    ctx.stroke();
  }

  // Deeper wider flow streaks
  ctx.lineWidth = 2.5;
  for (let y = startY + 25; y < endY - 45; y += 28) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const streakX = re + 40 + Math.sin(y * 0.07) * 12;
    if (streakX >= W - 5) continue;
    ctx.strokeStyle = `rgba(60,140,170,${0.04 + Math.sin(y * 0.04) * 0.015})`;
    ctx.beginPath();
    ctx.moveTo(streakX, y);
    ctx.bezierCurveTo(streakX + 4, y + 20, streakX - 4, y + 40, streakX + 1, y + 60);
    ctx.stroke();
  }

  // Light filtering — translucent ellipses near top
  const lightT = frameCount * 0.05;
  for (let y = startY + 15; y < startY + (endY - startY) * 0.4; y += 20) {
    const re = getWaveRightEdge(Math.min(y, OFF_WAVE_BACK));
    const cx = re + 12 + Math.sin(y * 0.1 + lightT) * 10;
    if (cx >= W - 8) continue;
    const alpha = 0.06 + Math.sin(lightT + y * 0.08) * 0.03;
    ctx.fillStyle = `rgba(150,240,255,${Math.max(0, alpha)})`;
    ctx.beginPath();
    ctx.ellipse(cx, y + Math.cos(y * 0.07 + lightT * 1.2) * 5, 10 + Math.sin(lightT + y) * 3, 5, 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawLipFoam() {
  const ft = frameCount * 0.1;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Pass 1: Wide soft glow
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 12;
  ctx.beginPath();
  let started = false;
  for (let y = BOAT_BOTTOM + 10; y < SAFE_BOTTOM + 50; y += 6) {
    const rx = getWaveRightEdge(y);
    const wobble = Math.sin(y * 0.08 + ft) * 3 + Math.cos(y * 0.13 + ft * 1.3) * 2;
    if (!started) { ctx.moveTo(rx + wobble, y); started = true; }
    else ctx.lineTo(rx + wobble, y);
  }
  ctx.stroke();

  // Pass 2: Narrow bright core
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  started = false;
  for (let y = BOAT_BOTTOM + 10; y < SAFE_BOTTOM + 50; y += 4) {
    const rx = getWaveRightEdge(y);
    const wobble = Math.sin(y * 0.08 + ft) * 2 + Math.cos(y * 0.15 + ft * 1.2) * 1.5;
    if (!started) { ctx.moveTo(rx + wobble, y); started = true; }
    else ctx.lineTo(rx + wobble, y);
  }
  ctx.stroke();

  // Pass 3: Scattered foam bubbles
  for (let y = BOAT_BOTTOM + 12; y < SAFE_BOTTOM + 45; y += 5) {
    const rx = getWaveRightEdge(y);
    const scatter = Math.sin(y * 0.2 + ft * 0.8) * 6;
    const bx = rx + scatter - 4;
    const by = y + Math.cos(y * 0.15 + ft) * 2;
    const alpha = 0.25 + Math.sin(y * 0.3 + ft * 1.5) * 0.15;
    const r = 1.5 + Math.sin(y * 0.18 + ft) * 0.8;
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0.1, alpha)})`;
    ctx.beginPath();
    ctx.arc(bx, by, r, 0, Math.PI * 2);
    ctx.fill();
    if (y % 10 < 3) {
      ctx.fillStyle = `rgba(200,245,255,${Math.max(0.08, alpha * 0.6)})`;
      ctx.beginPath();
      ctx.arc(bx - 6 + Math.sin(y * 0.12) * 3, by + 2, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pass 4: Spindrift droplets blown off lip
  for (let y = BOAT_BOTTOM + 20; y < SAFE_BOTTOM + 30; y += 12) {
    const rx = getWaveRightEdge(y);
    const drift = Math.sin(y * 0.09 + ft * 1.5) * 4;
    for (let d = 0; d < 3; d++) {
      const dx = rx + 8 + d * 5 + drift + Math.sin(ft + y * 0.1 + d) * 3;
      const dy = y + Math.cos(ft * 1.2 + d + y * 0.05) * 4;
      if (dx >= W - 3) continue;
      ctx.fillStyle = `rgba(255,255,255,${0.12 + Math.sin(ft + d + y * 0.1) * 0.06})`;
      ctx.beginPath();
      ctx.arc(dx, dy, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawWakeLines() {
  ctx.lineCap = 'round';
  const scroll = (frameCount * 0.5) % 26;
  for (let y = BOAT_BOTTOM + scroll; y < OFF_WAVE_BACK; y += 26) {
    const maxX = getWaveLeftEdge(y) - 12;
    if (maxX < 15) continue;
    ctx.strokeStyle = 'rgba(100,180,220,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(8, y);
    for (let sx = 8; sx < maxX; sx += 14) {
      const cy = y + Math.sin(sx * 0.06 + frameCount * 0.025) * 3;
      ctx.quadraticCurveTo(sx + 7, cy, sx + 14, y);
    }
    ctx.stroke();
  }
}

function drawBoat() {
  const bob = Math.sin(frameCount * 0.03) * 2;
  boatBob = bob;
  const by = 18 + bob;

  // Prop wash — churning water behind stern
  const washGrad = ctx.createRadialGradient(200, by + 48, 2, 200, by + 55, 35);
  washGrad.addColorStop(0, 'rgba(180,230,245,0.25)');
  washGrad.addColorStop(0.4, 'rgba(140,210,235,0.12)');
  washGrad.addColorStop(1, 'rgba(100,180,220,0)');
  ctx.fillStyle = washGrad;
  ctx.beginPath();
  ctx.ellipse(200, by + 52, 40, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Prop wash bubbles
  const washT = frameCount * 0.15;
  for (let i = 0; i < 10; i++) {
    const bx = 180 + (i * 4.3) + Math.sin(washT + i * 1.1) * 8;
    const by2 = by + 44 + (i * 2.1) + Math.cos(washT + i * 0.9) * 5;
    ctx.fillStyle = `rgba(200,240,255,${0.12 + Math.sin(washT + i) * 0.06})`;
    ctx.beginPath();
    ctx.arc(bx, by2, 1.5 + Math.sin(washT + i * 0.7) * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wake V-lines
  ctx.strokeStyle = 'rgba(170,238,255,0.08)';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    const wt = frameCount * 0.08 + i;
    ctx.beginPath();
    ctx.moveTo(170, by + 40);
    ctx.quadraticCurveTo(170 - i * 12, by + 46 + i * 5, 170 - i * 18, by + 52 + i * 8 + Math.sin(wt) * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(230, by + 40);
    ctx.quadraticCurveTo(230 + i * 12, by + 46 + i * 5, 230 + i * 18, by + 52 + i * 8 + Math.cos(wt) * 2);
    ctx.stroke();
  }

  // Hull shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(200, by + 30, 58, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hull — smooth bezier path
  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(145, by + 28);
  ctx.quadraticCurveTo(145, by + 10, 175, by + 6);
  ctx.lineTo(225, by + 6);
  ctx.quadraticCurveTo(255, by + 10, 255, by + 28);
  ctx.lineTo(250, by + 32);
  ctx.quadraticCurveTo(200, by + 36, 150, by + 32);
  ctx.closePath();
  ctx.fill();

  // Hull highlight stripe
  ctx.strokeStyle = 'rgba(80,80,100,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(150, by + 18);
  ctx.quadraticCurveTo(200, by + 14, 250, by + 18);
  ctx.stroke();

  // Transom
  ctx.fillStyle = '#353548';
  ctx.beginPath();
  ctx.moveTo(155, by + 30);
  ctx.quadraticCurveTo(200, by + 36, 245, by + 30);
  ctx.lineTo(245, by + 34);
  ctx.quadraticCurveTo(200, by + 40, 155, by + 34);
  ctx.closePath();
  ctx.fill();

  // Swim platform
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.moveTo(165, by + 36);
  ctx.quadraticCurveTo(200, by + 42, 235, by + 36);
  ctx.lineTo(235, by + 40);
  ctx.quadraticCurveTo(200, by + 46, 165, by + 40);
  ctx.closePath();
  ctx.fill();

  // Wake tower (stroked)
  ctx.strokeStyle = '#777788';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(175, by + 12);
  ctx.lineTo(178, by - 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(225, by + 12);
  ctx.lineTo(222, by - 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(178, by - 6);
  ctx.quadraticCurveTo(200, by - 10, 222, by - 6);
  ctx.stroke();
}

function drawSweetSpot() {
  const pulse = 0.12 + Math.sin(frameCount * 0.04) * 0.06;
  for (let y = SAFE_TOP + 20; y < SAFE_BOTTOM - 20; y += 12) {
    const center = getSweetSpotCenter(y);
    const radius = getSweetSpotRadius(y);
    const glow = ctx.createRadialGradient(center, y, 0, center, y, radius);
    glow.addColorStop(0, `rgba(0,229,255,${pulse * 1.5})`);
    glow.addColorStop(0.5, `rgba(0,229,255,${pulse * 0.8})`);
    glow.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.ellipse(center, y, radius, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawDangerWarning() {
  if (dangerFrontTimer > 20) {
    const alpha = 0.15 + Math.sin(frameCount * 0.3) * 0.1;
    const dGrad = ctx.createLinearGradient(0, BOAT_BOTTOM, 0, DANGER_FRONT);
    dGrad.addColorStop(0, `rgba(255,50,50,${alpha * 1.5})`);
    dGrad.addColorStop(1, 'rgba(255,50,50,0)');
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, BOAT_BOTTOM, W, DANGER_FRONT - BOAT_BOTTOM);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TOO CLOSE TO BOAT!', W / 2, DANGER_FRONT - 15);
    ctx.textAlign = 'left';
  }
  if (dangerBackTimer > 20) {
    const alpha = 0.15 + Math.sin(frameCount * 0.3) * 0.1;
    const dGrad = ctx.createLinearGradient(0, SAFE_BOTTOM, 0, DANGER_BACK);
    dGrad.addColorStop(0, 'rgba(255,50,50,0)');
    dGrad.addColorStop(1, `rgba(255,50,50,${alpha * 1.5})`);
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, SAFE_BOTTOM, W, DANGER_BACK - SAFE_BOTTOM);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('FALLING BEHIND!', W / 2, SAFE_BOTTOM + 30);
    ctx.textAlign = 'left';
  }
}

function drawRider() {
  const x = rider.x;
  const y = rider.y - (rider.airborne ? rider.airHeight * 12 : 0);
  const lean = rider.vx * 0.04;
  const crouch = Math.min(6, Math.abs(rider.vy) * 0.8);
  const shoulderTilt = rider.vx * 0.5;

  // Shadow when airborne
  if (rider.airborne) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(rider.x, rider.y + 10, 28, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(gameState === STATE.FALLING ? fallRotation : lean);

  const armSwing = rider.airborne ? -12
    : (pumpActive ? Math.sin(frameCount * 0.15) * 8 : Math.sin(frameCount * 0.06) * 1.5);

  // ═══ SURFBOARD ═══
  ctx.save();
  ctx.rotate(-0.15);

  // Board shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, 35, 30, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Board body — off-white
  ctx.fillStyle = '#F2F0E8';
  ctx.beginPath();
  ctx.ellipse(0, 33, 28, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Center stringer
  ctx.strokeStyle = '#C8B878';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(0, 27);
  ctx.lineTo(0, 39);
  ctx.stroke();

  // Traction pad — front
  ctx.fillStyle = 'rgba(40,40,40,0.3)';
  ctx.beginPath();
  ctx.ellipse(-8, 32, 8, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Traction pad — rear
  ctx.fillStyle = 'rgba(40,40,40,0.35)';
  ctx.beginPath();
  ctx.ellipse(8, 34, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rail highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.ellipse(0, 33, 28, 6, 0, -Math.PI * 0.8, Math.PI * 0.1);
  ctx.stroke();

  // Board rail outline
  ctx.strokeStyle = '#D0CEC0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, 33, 28, 6, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 3 Fins
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.ellipse(-10, 38, 3, 2, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, 38, 3, 2, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 39, 2.5, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore(); // undo board rotation

  // ═══ LEGS (bent knees, crouch responsive) ═══
  const kneeDepth = 20 + crouch * 0.4;
  const footY = 28 + crouch * 0.3;

  // Back leg (right, closer to viewer)
  ctx.strokeStyle = '#E8B87C';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(4, 8);
  ctx.quadraticCurveTo(7 + crouch * 0.2, kneeDepth - 4, 5, footY);
  ctx.quadraticCurveTo(5, footY + 2, 6, 32);
  ctx.stroke();
  // Calf shading
  ctx.strokeStyle = '#C49A64';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(5, footY - 2);
  ctx.lineTo(6, 31);
  ctx.stroke();

  // Front leg (left, further — darker)
  ctx.strokeStyle = '#D0A068';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-3, 8);
  ctx.quadraticCurveTo(-6 - crouch * 0.2, kneeDepth - 4, -5, footY);
  ctx.quadraticCurveTo(-4, footY + 2, -5, 32);
  ctx.stroke();

  // ═══ BOARD SHORTS ═══
  ctx.fillStyle = '#CC3520';
  ctx.beginPath();
  ctx.moveTo(-8, -1);
  ctx.quadraticCurveTo(-10, 4, -8, 10);
  ctx.lineTo(10, 10);
  ctx.quadraticCurveTo(12, 4, 10, -1);
  ctx.closePath();
  ctx.fill();
  // Waistband
  ctx.fillStyle = '#992818';
  ctx.beginPath();
  ctx.moveTo(-8, -1);
  ctx.quadraticCurveTo(0, -2, 10, -1);
  ctx.quadraticCurveTo(0, 0.5, -8, 0.5);
  ctx.closePath();
  ctx.fill();
  // Side stripe
  ctx.strokeStyle = '#E8552A';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(9, 1);
  ctx.lineTo(9, 9);
  ctx.stroke();

  // ═══ TORSO (rash guard) ═══
  ctx.fillStyle = '#1E5C99';
  ctx.beginPath();
  ctx.moveTo(-9, -18);
  ctx.quadraticCurveTo(-12, -10, -10, -1);
  ctx.lineTo(10, -1);
  ctx.quadraticCurveTo(12, -10, 9, -18);
  ctx.closePath();
  ctx.fill();
  // Lighter center panel
  ctx.fillStyle = '#2878B8';
  ctx.beginPath();
  ctx.moveTo(-4, -16);
  ctx.quadraticCurveTo(-5, -8, -4, -1);
  ctx.lineTo(4, -1);
  ctx.quadraticCurveTo(5, -8, 4, -16);
  ctx.closePath();
  ctx.fill();
  // Dark seam accents
  ctx.fillStyle = '#153D66';
  ctx.beginPath();
  ctx.moveTo(-9, -16);
  ctx.quadraticCurveTo(-11, -10, -10, -3);
  ctx.lineTo(-8, -3);
  ctx.quadraticCurveTo(-9, -10, -7, -16);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(9, -16);
  ctx.quadraticCurveTo(11, -10, 10, -3);
  ctx.lineTo(8, -3);
  ctx.quadraticCurveTo(9, -10, 7, -16);
  ctx.closePath();
  ctx.fill();

  // ═══ ARMS ═══
  const armSpread = rider.airborne ? 1.8 : 1;

  // Lead arm (right) extends toward wave
  ctx.strokeStyle = '#E8B87C';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(9, -14);
  ctx.quadraticCurveTo(16 + shoulderTilt * 0.3, -12 - armSwing * 0.5, 20 * armSpread + shoulderTilt * 0.5, -6 - armSwing);
  ctx.stroke();
  ctx.fillStyle = '#E8B87C';
  ctx.beginPath();
  ctx.arc(20 * armSpread + shoulderTilt * 0.5, -6 - armSwing, 3, 0, Math.PI * 2);
  ctx.fill();

  // Back arm (left) for balance
  ctx.strokeStyle = '#D0A068';
  ctx.lineWidth = 4.5;
  ctx.beginPath();
  ctx.moveTo(-9, -14);
  ctx.quadraticCurveTo(-16 - shoulderTilt * 0.3, -12 + armSwing * 0.5, -18 * armSpread - shoulderTilt * 0.5, -8 + armSwing);
  ctx.stroke();
  ctx.fillStyle = '#D0A068';
  ctx.beginPath();
  ctx.arc(-18 * armSpread - shoulderTilt * 0.5, -8 + armSwing, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // ═══ NECK ═══
  ctx.fillStyle = '#E8B87C';
  ctx.beginPath();
  ctx.ellipse(0, -20, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // ═══ HEAD (turned slightly forward) ═══
  ctx.fillStyle = '#E8B87C';
  ctx.beginPath();
  ctx.ellipse(1, -29, 8, 9, 0, 0, Math.PI * 2);
  ctx.fill();
  // Ear (right side visible)
  ctx.fillStyle = '#D0A068';
  ctx.beginPath();
  ctx.ellipse(9, -28, 2.5, 3, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#C49A64';
  ctx.beginPath();
  ctx.ellipse(9, -28, 1.5, 2, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // ═══ HAIR ═══
  // Dark brown base
  ctx.fillStyle = '#6B4226';
  ctx.beginPath();
  ctx.ellipse(0, -34, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-3, -32, 8, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(3, -33, 7, 5, 0.15, 0, Math.PI * 2);
  ctx.fill();
  // Wind-blown top tuft
  ctx.beginPath();
  ctx.ellipse(1, -38, 5, 4, 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Sun-bleached highlights
  ctx.fillStyle = '#9B6A3C';
  ctx.beginPath();
  ctx.ellipse(2, -37, 3, 2.5, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-4, -34, 2.5, 2, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Dark underside edges
  ctx.fillStyle = '#4A2E16';
  ctx.beginPath();
  ctx.ellipse(-6, -32, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, -32, 2.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBoardWake(x, y) {
  const speed = Math.sqrt(rider.vx * rider.vx + rider.vy * rider.vy);
  if (speed < 0.5) return;
  const intensity = Math.min(1, speed / 5);

  // Wake trail — two diverging curves
  ctx.strokeStyle = `rgba(200,240,255,${0.25 * intensity})`;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - 8, y + 36);
  ctx.quadraticCurveTo(x - 16 - speed * 2, y + 42, x - 22 - speed * 2.5, y + 48);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 36);
  ctx.quadraticCurveTo(x + 16 + speed * 2, y + 42, x + 22 + speed * 2.5, y + 48);
  ctx.stroke();

  // Spray mist at board tail
  const mistGrad = ctx.createRadialGradient(x, y + 38, 1, x, y + 38, 12 + speed * 2);
  mistGrad.addColorStop(0, `rgba(200,240,255,${0.2 * intensity})`);
  mistGrad.addColorStop(1, 'rgba(200,240,255,0)');
  ctx.fillStyle = mistGrad;
  ctx.beginPath();
  ctx.arc(x, y + 38, 12 + speed * 2, 0, Math.PI * 2);
  ctx.fill();

  // Smooth droplets
  for (let i = 0; i < 5 * intensity; i++) {
    ctx.fillStyle = `rgba(200,240,255,${0.25 * intensity})`;
    ctx.beginPath();
    ctx.arc(x + (Math.random() - 0.5) * 28, y + 38 + Math.random() * 10,
      1 + Math.random() * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rooster tail on hard carves
  if (speed > 3) {
    const dir = -Math.sign(rider.vx);
    const ri = Math.min(1, (speed - 3) / 4);

    ctx.strokeStyle = `rgba(255,255,255,${0.35 * ri})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + 34);
    ctx.bezierCurveTo(x + dir * 14, y + 22, x + dir * 24, y + 16 - speed, x + dir * 34, y + 10 - speed * 1.5);
    ctx.stroke();

    for (let i = 0; i < 7 * ri; i++) {
      ctx.fillStyle = `rgba(255,255,255,${0.35 * ri * Math.random()})`;
      ctx.beginPath();
      ctx.arc(x + dir * (12 + Math.random() * 22),
        y + 24 + Math.random() * 14 - speed, 1 + Math.random() * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Game Flow ──
function startGame() {
  gameState = STATE.PLAYING;
  gameRunning = true;
  score = 0;
  frameCount = 0;
  combo = 1;
  comboTimer = 0;
  bestCombo = 1;
  floatingTexts = [];
  particles = [];
  rider.x = W * 0.4;
  rider.y = H * 0.5;
  rider.vx = 0;
  rider.vy = 0;
  rider.airborne = false;
  rider.airTime = 0;
  rider.airHeight = 0;
  waveNarrowFactor = 1.0;
  sweetSpotSize = 1.0;
  turbulenceLevel = 0;
  wavePushForce = 0.04;
  difficultyLevel = 1;
  difficultyTimer = 0;
  rogueWaveTimer = 0;
  rogueWaveActive = false;
  dangerFrontTimer = 0;
  dangerBackTimer = 0;
  offWaveTimer = 0;
  betaHistory = [];
  pumpActive = false;
  pumpBoost = 0;
  fallTimer = 0;
  rideStartTime = performance.now();
  document.getElementById('game-over-overlay').style.display = 'none';
}

function showGameOver() {
  const rideTime = ((performance.now() - rideStartTime) / 1000).toFixed(1);
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('ride-time').textContent = 'Ride time: ' + rideTime + 's';
  document.getElementById('best-combo').textContent = 'Best combo: x' + bestCombo;
  document.getElementById('game-over-overlay').style.display = 'flex';
  if (conn && conn.open) {
    conn.send(JSON.stringify({ type: 'gameover', score }));
  }
}

function restartGame() {
  startGame();
}

// ── Main Loop ──
function gameLoop() {
  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background layers (back-to-front)
  drawSky();
  drawDeepWater();
  drawWaveFace();
  drawWaveWall();
  drawLipFoam();
  drawWakeLines();
  drawBoat();
  drawSweetSpot();

  if (gameState === STATE.PLAYING) {
    frameCount++;
    processGyro();
    detectPump();
    updatePhysics(1);
    updateDifficulty();
    updateCombo();
    spawnCarveSpray();

    // Riding score
    if (isInSweetSpot(rider.x, rider.y)) {
      score += 1;
    } else if (isOnWave(rider.x, rider.y)) {
      score += 0.5;
    }

    // Pump score
    if (pumpActive) score += 2;

    drawDangerWarning();
  } else if (gameState === STATE.FALLING) {
    frameCount++;
    updateFall();
  }

  // Board wake before rider so spray trail is behind
  if (!rider.airborne && gameState !== STATE.GAME_OVER) {
    const ry = rider.y - (rider.airborne ? rider.airHeight * 12 : 0);
    drawBoardWake(rider.x, ry);
  }

  // Draw rider
  drawRider();

  // Particles & floating text
  updateParticles();
  updateFloatingTexts();

  // Score display
  document.getElementById('score-display').textContent = 'SCORE: ' + Math.floor(score);

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
